canvas { display: block; cursor: default; image-rendering: pixelated; }
#gameContainer {
  position: relative;
  border: 4px solid #5a3a1a;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
}

<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="1100" height="680"></canvas>
</div>

<script>
// ============================================================
//  FROG LEGENDS — Axie Infinity-style 3v3 Turn-Based Battle
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- Sprite sheet frame data ----
const FRAME_DATA = [
  { x: 19, y: 30, w: 77, h: 57 },
  { x: 147, y: 29, w: 77, h: 57 },
  { x: 276, y: 29, w: 77, h: 57 },
  { x: 405, y: 30, w: 77, h: 57 },
  { x: 533, y: 31, w: 77, h: 57 },
  { x: 659, y: 31, w: 77, h: 57 },
];

// ---- Asset loading ----
const images = {};
const imageSources = {
  ember: 'sprites/ember/ember_sheet_6frame.png',
  toxic: 'sprites/toxic/toxic_sheet_6frame.png',
  frost: 'sprites/frost/frost_sheet_6frame.png',
};
let loadedCount = 0;
const totalImages = Object.keys(imageSources).length;
for (const [key, src] of Object.entries(imageSources)) {
  const img = new Image();
  img.onload = () => { loadedCount++; if (loadedCount >= totalImages) { generateBackground(); init(); } };
  img.onerror = () => console.error('Failed:', src);
  img.src = src;
  images[key] = img;
}

// ============================================================
//  TWEEN ENGINE
// ============================================================
function easeOutQuad(t) { return t * (2 - t); }
function easeOutBack(t) { const s = 1.70158; return 1 + (--t) * t * ((s + 1) * t + s); }
function easeOutElastic(t) {
  return t === 0 || t === 1 ? t : Math.pow(2, -10 * t) * Math.sin((t - 0.1) * 5 * Math.PI) + 1;
}
function easeInQuad(t) { return t * t; }
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

const tweens = [];
function tweenTo(target, props, duration, ease = easeOutQuad, onComplete) {
  const tw = { target, props: {}, duration, elapsed: 0, ease, onComplete, done: false };
  for (const [k, v] of Object.entries(props)) tw.props[k] = { from: target[k], to: v };
  tweens.push(tw);
  return tw;
}
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i];
    tw.elapsed = Math.min(tw.elapsed + dt, tw.duration);
    const t = tw.ease(tw.elapsed / tw.duration);
    for (const [k, { from, to }] of Object.entries(tw.props)) tw.target[k] = from + (to - from) * t;
    if (tw.elapsed >= tw.duration) { tweens.splice(i, 1); tw.onComplete?.(); }
  }
}
function killTweensOf(target) {
  for (let i = tweens.length - 1; i >= 0; i--) if (tweens[i].target === target) tweens.splice(i, 1);
}

// ============================================================
//  SCREEN SHAKE
// ============================================================
const camera = { offsetX: 0, offsetY: 0, shakePower: 0, shakeDuration: 0, shakeElapsed: 0 };
function screenShake(power = 8, duration = 400) {
  camera.shakePower = power; camera.shakeDuration = duration; camera.shakeElapsed = 0;
}
function updateShake(dt) {
  if (camera.shakeElapsed < camera.shakeDuration) {
    camera.shakeElapsed += dt;
    const p = camera.shakePower * (1 - camera.shakeElapsed / camera.shakeDuration);
    camera.offsetX = (Math.random() * 2 - 1) * p;
    camera.offsetY = (Math.random() * 2 - 1) * p;
  } else { camera.offsetX = 0; camera.offsetY = 0; }
}

// ============================================================
//  PARTICLES
// ============================================================
const particlePool = [], activeParticles = [];
function getP() { return particlePool.pop() || {}; }
function spawnParticles(x, y, count, color, type = 'circle', spread = 5) {
  for (let i = 0; i < count; i++) {
    const p = getP();
    Object.assign(p, {
      x: x + (Math.random() - 0.5) * 30, y: y + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * spread, vy: (Math.random() - 1) * spread,
      color, type, size: 3 + Math.random() * 5, alpha: 1,
      life: 400 + Math.random() * 400, maxLife: 0, rotation: Math.random() * 6.28
    });
    p.maxLife = p.life;
    activeParticles.push(p);
  }
}
function updateParticles(dt) {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.x += p.vx * dt / 16; p.y += p.vy * dt / 16; p.vy += 0.12 * dt / 16;
    p.life -= dt; p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) { activeParticles.splice(i, 1); particlePool.push(p); }
  }
}
function drawParticles() {
  for (const p of activeParticles) {
    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
    if (p.type === 'circle') { ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.alpha, 0, 6.28); ctx.fill(); }
    else if (p.type === 'star') {
      ctx.translate(p.x, p.y); ctx.rotate(p.rotation + p.life * 0.01);
      drawStar(0, 0, p.size * p.alpha, p.size * 0.4 * p.alpha, 5); ctx.fill();
    } else if (p.type === 'spark') {
      ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.beginPath();
      ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3); ctx.stroke();
    }
    ctx.restore();
  }
}
function drawStar(cx, cy, or, ir, pts) {
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r = i % 2 === 0 ? or : ir, a = (i * Math.PI) / pts - Math.PI / 2;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a)) : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
}

// ============================================================
//  FLOATING TEXTS
// ============================================================
const floatingTexts = [];
function spawnText(x, y, text, color, scale = 1.5) {
  floatingTexts.push({ x: x + (Math.random() - 0.5) * 30, y, text, color, vy: -2.8, life: 1200, maxLife: 1200, scale });
}
function updateTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i]; f.y += f.vy * dt / 16; f.vy *= 0.98; f.life -= dt;
    if (f.life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawTexts() {
  for (const f of floatingTexts) {
    const a = Math.max(0, f.life / f.maxLife);
    const s = f.scale * (0.8 + 0.2 * Math.min(1, (f.maxLife - f.life) / 150));
    ctx.save(); ctx.globalAlpha = a;
    ctx.font = `bold ${Math.round(20 * s)}px "Segoe UI", Arial`;
    ctx.textAlign = 'center'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.strokeText(f.text, f.x, f.y); ctx.fillStyle = f.color; ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

// ============================================================
//  PROCEDURAL BACKGROUND
// ============================================================
let bgCanvas = null;
function generateBackground() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const g = bgCanvas.getContext('2d');

  // Lush green forest arena (like Axie)
  // Sky
  const sky = g.createLinearGradient(0, 0, 0, H * 0.5);
  sky.addColorStop(0, '#5ec8e5'); sky.addColorStop(1, '#a8e6a0');
  g.fillStyle = sky; g.fillRect(0, 0, W, H * 0.55);

  // Ground
  const gnd = g.createLinearGradient(0, H * 0.5, 0, H);
  gnd.addColorStop(0, '#5daa35'); gnd.addColorStop(0.3, '#4a9428');
  gnd.addColorStop(1, '#3a7a1e');
  g.fillStyle = gnd; g.fillRect(0, H * 0.48, W, H * 0.52);

  // Background trees/forest
  g.fillStyle = '#3a8825';
  for (let i = 0; i < 8; i++) {
    const tx = i * 150 + (Math.random() - 0.5) * 60;
    const ty = H * 0.42;
    g.beginPath();
    g.ellipse(tx, ty, 50 + Math.random() * 40, 60 + Math.random() * 50, 0, 0, Math.PI * 2);
    g.fill();
  }
  g.fillStyle = '#4a9a30';
  for (let i = 0; i < 10; i++) {
    const tx = i * 120 + (Math.random() - 0.5) * 50;
    const ty = H * 0.46;
    g.beginPath();
    g.ellipse(tx, ty, 40 + Math.random() * 35, 40 + Math.random() * 40, 0, 0, Math.PI * 2);
    g.fill();
  }

  // Big trees on edges (like Axie's forest frame)
  drawBigTree(g, 30, H * 0.15, 0.9);
  drawBigTree(g, W - 30, H * 0.15, -0.9);

  // Floating rocks/platforms in background
  g.fillStyle = '#6aaa44';
  for (const [fx, fy, fw] of [[200, 100, 80], [750, 80, 100], [500, 60, 60], [900, 120, 70]]) {
    g.beginPath(); g.ellipse(fx, fy + 20, fw, 15, 0, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#5a9a38';
    g.beginPath();
    g.moveTo(fx - fw, fy + 15);
    for (let t = 0; t <= 1; t += 0.1)
      g.lineTo(fx - fw + fw * 2 * t, fy + 5 - Math.sin(t * Math.PI) * 15);
    g.lineTo(fx + fw, fy + 15); g.closePath(); g.fill();
    g.fillStyle = '#6aaa44';
  }

  // Clouds
  g.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 5; i++) {
    const cx = 100 + Math.random() * (W - 200), cy = 30 + Math.random() * 80;
    const cw = 60 + Math.random() * 100;
    g.beginPath(); g.ellipse(cx, cy, cw, 18, 0, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.ellipse(cx - cw * 0.3, cy + 5, cw * 0.6, 14, 0, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.ellipse(cx + cw * 0.3, cy + 3, cw * 0.5, 15, 0, 0, Math.PI * 2); g.fill();
  }

  // Ground texture - grass tufts
  g.strokeStyle = '#68b840';
  g.lineWidth = 2;
  for (let i = 0; i < 80; i++) {
    const gx = Math.random() * W, gy = H * 0.5 + Math.random() * (H * 0.45);
    for (let b = 0; b < 3; b++) {
      g.beginPath();
      g.moveTo(gx + b * 3 - 3, gy);
      g.quadraticCurveTo(gx + (Math.random() - 0.5) * 8, gy - 10, gx + (Math.random() - 0.5) * 6, gy - 14 - Math.random() * 6);
      g.stroke();
    }
  }

  // Light rays
  g.globalAlpha = 0.06;
  g.fillStyle = '#fff';
  for (let i = 0; i < 5; i++) {
    const rx = 200 + i * 180;
    g.beginPath();
    g.moveTo(rx, 0); g.lineTo(rx - 60, H * 0.6); g.lineTo(rx + 60, H * 0.6);
    g.closePath(); g.fill();
  }
  g.globalAlpha = 1;

  // Mushrooms
  for (let i = 0; i < 6; i++) {
    const mx = Math.random() * W, my = H * 0.52 + Math.random() * (H * 0.3);
    g.fillStyle = '#cc4444';
    g.beginPath(); g.ellipse(mx, my - 6, 6, 4, 0, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#ddd'; g.fillRect(mx - 2, my - 3, 4, 8);
  }
}

function drawBigTree(g, x, y, dir) {
  // Trunk
  g.fillStyle = '#5a3a1a';
  g.beginPath();
  g.moveTo(x - 30 * dir, H);
  g.quadraticCurveTo(x - 20 * dir, y + 100, x + 10 * dir, y + 50);
  g.quadraticCurveTo(x + 20 * dir, y + 100, x + 40 * dir, H);
  g.closePath();
  g.fill();
  // Canopy
  g.fillStyle = '#2d7a22';
  g.beginPath(); g.ellipse(x + 5 * dir, y + 30, 80, 70, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#3a8a2a';
  g.beginPath(); g.ellipse(x - 20 * dir, y + 10, 60, 55, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#4a9a35';
  g.beginPath(); g.ellipse(x + 25 * dir, y, 50, 45, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#55aa40';
  g.beginPath(); g.ellipse(x, y - 15, 40, 35, 0, 0, Math.PI * 2); g.fill();
  // Vine
  g.strokeStyle = '#3a8825';
  g.lineWidth = 3;
  g.beginPath();
  g.moveTo(x + 30 * dir, y + 50);
  g.quadraticCurveTo(x + 50 * dir, y + 100, x + 35 * dir, y + 160);
  g.stroke();
}

// ============================================================
//  POWER / STATUS SYSTEM
// ============================================================
const POWER_DEFS = {
  strength:   { name: 'STR',  color: '#ff6644', icon: '💪' },
  weak:       { name: 'WEAK', color: '#8866aa', icon: '😩' },
  vulnerable: { name: 'VULN', color: '#ff4488', icon: '💔' },
  poison:     { name: 'PSN',  color: '#aa44ff', icon: '☠️' },
  regen:      { name: 'RGN',  color: '#44dd66', icon: '💚' },
};

// ============================================================
//  DAMAGE PIPELINE
// ============================================================
function calcDamage(baseDmg, attacker, defender) {
  let dmg = baseDmg + (attacker.powers.strength || 0);
  if (attacker.powers.weak > 0) dmg = Math.floor(dmg * 0.75);
  // Crit: 8% chance, 1.5x
  let isCrit = Math.random() < 0.08;
  if (isCrit) dmg = Math.floor(dmg * 1.5);
  // Random roll 85-100%
  dmg = Math.floor(dmg * (0.85 + Math.random() * 0.15));
  if (defender.powers.vulnerable > 0) dmg = Math.floor(dmg * 1.5);
  return { dmg: Math.max(1, dmg), isCrit };
}

function applyDamage(target, rawDmg, color = '#ff4444', isCrit = false) {
  let dmg = rawDmg;
  if (target.block > 0) {
    const blocked = Math.min(target.block, dmg);
    target.block -= blocked; dmg -= blocked;
    if (blocked > 0) { spawnText(target.x, target.y - 50, `${blocked} BLOCKED`, '#4488ff'); spawnParticles(target.x, target.y, 5, '#4488ff', 'star'); }
  }
  if (dmg > 0) {
    target.hp = Math.max(0, target.hp - dmg);
    target.flash = 250; target.flashColor = color;
    killTweensOf(target); target.scaleX = 1.3; target.scaleY = 0.7;
    tweenTo(target, { scaleX: 1, scaleY: 1 }, 500, easeOutElastic);
    screenShake(Math.min(3 + dmg * 0.25, 14), 250);
  }
  let label = `${rawDmg}`;
  if (isCrit) label = `${rawDmg}!`;
  spawnText(target.x, target.y - 40, label, isCrit ? '#ffff00' : color, isCrit ? 2.2 : 1.8);
  if (isCrit) spawnParticles(target.x, target.y, 20, '#ffff00', 'star', 8);
  return dmg;
}

// ============================================================
//  CARDS — Axie-style with creature portraits
// ============================================================
const CARD_DEFS = [
  { name: 'Slash',      cost: 1, baseDmg: 10, type: 'attack', powers: {},                color: '#e85d3a', icon: '⚔️',  desc: 'Deal 10 damage', sprite: 'ember' },
  { name: 'Fireball',   cost: 2, baseDmg: 18, type: 'attack', powers: {},                color: '#e83a2a', icon: '🔥', desc: 'Deal 18 fire dmg', sprite: 'ember' },
  { name: 'Bite',       cost: 1, baseDmg: 7,  type: 'attack', powers: {},                color: '#e8a03a', icon: '🦷', desc: '7 dmg x2 hits', sprite: 'ember', multi: 2 },
  { name: 'Heavy Slam', cost: 2, baseDmg: 22, type: 'attack', powers: { vulnerable: 1 }, color: '#cc5533', icon: '💥', desc: '22 dmg + 1 Vuln', sprite: 'ember' },
  { name: 'Venom Spit', cost: 2, baseDmg: 8,  type: 'attack', powers: { poison: 4 },     color: '#aa44ff', icon: '☠️',  desc: '8 dmg + 4 Poison', sprite: 'toxic' },
  { name: 'Heal',       cost: 1, heal: 15,    type: 'skill',  powers: {},                color: '#44bb55', icon: '💚', desc: 'Heal 15 HP', sprite: 'frost' },
  { name: 'Shield',     cost: 1, block: 10,   type: 'skill',  powers: {},                color: '#4488cc', icon: '🛡️',  desc: 'Gain 10 Block', sprite: 'frost' },
  { name: 'Rage',       cost: 1, type: 'power', powers: { strength: 2 }, selfPowers: true, color: '#e86830', icon: '💢', desc: 'Gain 2 Strength', sprite: 'ember' },
  { name: 'Regen',      cost: 1, type: 'power', powers: { regen: 3 }, selfPowers: true,   color: '#44cc66', icon: '🌱', desc: 'Gain 3 Regen', sprite: 'frost' },
  { name: 'Acid Bath',  cost: 2, baseDmg: 12, type: 'attack', powers: { weak: 2 },       color: '#88cc22', icon: '🧪', desc: '12 dmg + 2 Weak', sprite: 'toxic' },
  { name: 'Soul Drain', cost: 3, baseDmg: 20, type: 'attack', powers: {},                color: '#cc44aa', icon: '🩸', desc: '20 dmg, heal 50%', sprite: 'ember', drain: true },
];

// ============================================================
//  FIGHTER (creature)
// ============================================================
function createFrog(name, hp, imgKey, isPlayer, slot) {
  // Positions: 3 frogs on each side, staggered like Axie
  const px = isPlayer
    ? [160, 230, 300][slot]
    : [W - 160, W - 230, W - 300][slot];
  const py = isPlayer
    ? [340, 290, 380][slot]
    : [340, 290, 380][slot];
  return {
    name, hp, maxHp: hp, block: 0, powers: {}, alive: true,
    imgKey, isPlayer, slot,
    x: px, y: py, baseX: px, baseY: py,
    scale: slot === 0 ? 2.8 : slot === 1 ? 2.4 : 2.0,
    scaleX: 1, scaleY: 1,
    frame: 0, frameTimer: 0, animSpeed: 100 + slot * 20,
    flash: 0, flashColor: '#fff',
  };
}

// ============================================================
//  DECK SYSTEM
// ============================================================
let drawPile = [], hand = [], discardPile = [];
function buildDeck() {
  const deck = [];
  for (const def of CARD_DEFS) for (let i = 0; i < 2; i++) deck.push({ ...def, id: Math.random().toString(36).substr(2, 9) });
  shuffle(deck); drawPile = deck; hand = []; discardPile = [];
}
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } }
function drawCards(n) {
  for (let i = 0; i < n; i++) {
    if (drawPile.length === 0) { drawPile = [...discardPile]; discardPile = []; shuffle(drawPile); }
    if (drawPile.length > 0 && hand.length < 6) hand.push(drawPile.pop());
  }
}

// ============================================================
//  ENEMY INTENT SYSTEM
// ============================================================
const ENEMY_INTENTS = [
  { name: 'Claw',       type: 'attack', dmg: 10, color: '#e85d3a' },
  { name: 'Venom Spit', type: 'poison', dmg: 6, poisonAmt: 4, color: '#aa44ff' },
  { name: 'Heal',       type: 'heal',   heal: 12, color: '#44bb55' },
  { name: 'Shield',     type: 'block',  block: 10, color: '#4488cc' },
  { name: 'Heavy Slam', type: 'attack', dmg: 16, color: '#cc5533', vuln: 1 },
  { name: 'Acid Spray', type: 'debuff', weak: 2, color: '#88cc22' },
];

function rollIntent(frog) {
  const hp = frog.hp / frog.maxHp;
  const w = hp < 0.3 ? [1, 0, 4, 2, 0, 0] : hp < 0.6 ? [2, 1, 1, 2, 2, 1] : [3, 2, 0, 1, 2, 2];
  const total = w.reduce((a, b) => a + b);
  let r = Math.random() * total;
  for (let i = 0; i < w.length; i++) { r -= w[i]; if (r <= 0) return { ...ENEMY_INTENTS[i] }; }
  return { ...ENEMY_INTENTS[0] };
}

// ============================================================
//  GAME STATE
// ============================================================
const ENERGY_MAX = 3;
let gameState = 'loading';
let turnNumber = 0;
let playerTeam = [], enemyTeam = [];
let energy = ENERGY_MAX;
let hoveredCard = -1, selectedTarget = -1, endTurnHovered = false, restartHovered = false;
let activeCard = null; // card being played (shown at top)
let activeCardTimer = 0;
let enemyIntents = []; // one per enemy frog

function init() {
  playerTeam = [
    createFrog('Ember', 55, 'ember', true, 0),
    createFrog('Frost', 50, 'frost', true, 1),
    createFrog('Toxic', 48, 'toxic', true, 2),
  ];
  enemyTeam = [
    createFrog('Venom', 48, 'toxic', false, 0),
    createFrog('Blaze', 44, 'ember', false, 1),
    createFrog('Ice',   42, 'frost', false, 2),
  ];
  energy = ENERGY_MAX;
  turnNumber = 0;
  floatingTexts.length = 0;
  activeParticles.length = 0;
  tweens.length = 0;
  activeCard = null;
  buildDeck();
  enemyIntents = enemyTeam.map(f => rollIntent(f));
  startPlayerTurn();
  gameState = 'playerTurn';
  lastTime = 0;
  requestAnimationFrame(gameLoop);
}

function allFrogs() { return [...playerTeam, ...enemyTeam]; }
function alivePlayerFrogs() { return playerTeam.filter(f => f.alive); }
function aliveEnemyFrogs() { return enemyTeam.filter(f => f.alive); }

function startPlayerTurn() {
  turnNumber++;
  energy = ENERGY_MAX;
  playerTeam.forEach(f => { if (f.alive) { f.block = 0; processStartOfTurn(f); } });
  drawCards(4);
}

function processStartOfTurn(f) {
  if (f.powers.poison > 0) {
    f.hp = Math.max(0, f.hp - f.powers.poison);
    f.flash = 200; f.flashColor = '#aa44ff';
    spawnText(f.x, f.y - 50, `${f.powers.poison} PSN`, '#cc66ff');
    spawnParticles(f.x, f.y, 8, '#aa44ff', 'circle');
    f.powers.poison--;
    if (f.powers.poison <= 0) delete f.powers.poison;
    if (f.hp <= 0) killFrog(f);
  }
  if (f.powers.regen > 0) {
    const h = f.powers.regen;
    f.hp = Math.min(f.maxHp, f.hp + h);
    spawnText(f.x, f.y - 50, `+${h}`, '#44dd66');
    spawnParticles(f.x, f.y, 5, '#44ff66', 'circle', 3);
    f.powers.regen--;
    if (f.powers.regen <= 0) delete f.powers.regen;
  }
}

function killFrog(f) {
  f.alive = false;
  f.hp = 0;
  spawnParticles(f.x, f.y, 30, '#ff4444', 'star', 10);
  screenShake(12, 400);
}

function decayPowers(f) {
  for (const k of ['weak', 'vulnerable']) {
    if (f.powers[k] > 0) { f.powers[k]--; if (f.powers[k] <= 0) delete f.powers[k]; }
  }
}

function checkWinLose() {
  if (aliveEnemyFrogs().length === 0) { setTimeout(() => gameState = 'win', 800); return true; }
  if (alivePlayerFrogs().length === 0) { setTimeout(() => gameState = 'lose', 800); return true; }
  return false;
}

// ============================================================
//  PLAY CARD
// ============================================================
function canPlayCard(card) { return card.cost <= energy; }

function playCard(cardIndex, targetFrog) {
  if (gameState !== 'playerTurn') return;
  const card = hand[cardIndex];
  if (!card || !canPlayCard(card)) return;
  energy -= card.cost;
  hand.splice(cardIndex, 1);
  discardPile.push(card);
  activeCard = card; activeCardTimer = 1500;
  gameState = 'animating';

  const attacker = alivePlayerFrogs()[0] || playerTeam[0];

  switch (card.type) {
    case 'attack': {
      const hits = card.multi || 1;
      doAttackSeq(attacker, targetFrog, card, hits, 0, () => {
        applyCardPowers(card, targetFrog);
        if (card.drain) {
          const h = Math.floor(card.baseDmg * 0.5);
          attacker.hp = Math.min(attacker.maxHp, attacker.hp + h);
          spawnText(attacker.x, attacker.y - 50, `+${h}`, '#44dd66');
          spawnParticles(attacker.x, attacker.y, 8, '#44ff66', 'circle', 3);
        }
        if (targetFrog.hp <= 0) killFrog(targetFrog);
        if (!checkWinLose()) setTimeout(() => { gameState = 'playerTurn'; }, 200);
      });
      break;
    }
    case 'skill': {
      if (card.heal) {
        const t = attacker;
        t.hp = Math.min(t.maxHp, t.hp + card.heal);
        spawnText(t.x, t.y - 50, `+${card.heal}`, '#44dd66');
        spawnParticles(t.x, t.y, 12, '#44ff66', 'circle', 4);
      }
      if (card.block) {
        attacker.block += card.block;
        spawnText(attacker.x, attacker.y - 50, `+${card.block} BLK`, '#4488ff');
        spawnParticles(attacker.x, attacker.y, 10, '#4488ff', 'star', 3);
      }
      applyCardPowers(card, targetFrog);
      setTimeout(() => { gameState = 'playerTurn'; }, 300);
      break;
    }
    case 'power': {
      const t = card.selfPowers ? attacker : targetFrog;
      applyCardPowers(card, t);
      setTimeout(() => { gameState = 'playerTurn'; }, 300);
      break;
    }
  }
}

function applyCardPowers(card, target) {
  if (!card.powers) return;
  for (const [k, v] of Object.entries(card.powers)) {
    if (v <= 0) continue;
    target.powers[k] = (target.powers[k] || 0) + v;
    const d = POWER_DEFS[k];
    if (d) { spawnText(target.x, target.y - 70, `+${v} ${d.name}`, d.color); spawnParticles(target.x, target.y, 6, d.color, 'circle', 3); }
  }
}

function doAttackSeq(atk, def, card, total, cur, cb) {
  if (cur >= total || !def.alive) { cb(); return; }
  doLunge(atk, def, () => {
    const { dmg, isCrit } = calcDamage(card.baseDmg, atk, def);
    applyDamage(def, dmg, card.color, isCrit);
    spawnParticles(def.x, def.y, 12, card.color, 'spark', 7);
  }, () => setTimeout(() => doAttackSeq(atk, def, card, total, cur + 1, cb), 120));
}

function doLunge(atk, def, onHit, onDone) {
  const sx = atk.baseX, tx = def.x + (atk.isPlayer ? -60 : 60);
  tweenTo(atk, { x: sx + (atk.isPlayer ? -12 : 12) }, 70, easeInQuad, () => {
    tweenTo(atk, { x: tx }, 180, easeInOutQuad, () => {
      onHit();
      tweenTo(atk, { x: sx }, 220, easeOutBack, onDone);
    });
  });
}

// ============================================================
//  END TURN / ENEMY TURN
// ============================================================
function endTurn() {
  if (gameState !== 'playerTurn') return;
  discardPile.push(...hand); hand = [];
  alivePlayerFrogs().forEach(decayPowers);
  gameState = 'enemyTurn';
  setTimeout(enemyTurn, 400);
}

function enemyTurn() {
  // Process enemy start of turn
  enemyTeam.forEach(f => { if (f.alive) { f.block = 0; processStartOfTurn(f); if (f.hp <= 0) killFrog(f); } });
  if (checkWinLose()) return;

  // Execute intents sequentially
  const aliveEnemies = aliveEnemyFrogs();
  let idx = 0;
  function nextEnemyAction() {
    if (idx >= aliveEnemies.length) {
      // Reroll intents and start player turn
      enemyIntents = enemyTeam.map(f => f.alive ? rollIntent(f) : null);
      aliveEnemyFrogs().forEach(decayPowers);
      setTimeout(() => { gameState = 'playerTurn'; startPlayerTurn(); }, 300);
      return;
    }
    const ef = aliveEnemies[idx];
    const eidx = enemyTeam.indexOf(ef);
    const intent = enemyIntents[eidx];
    idx++;
    if (!intent) { nextEnemyAction(); return; }

    gameState = 'animating';
    const target = randomAlive(playerTeam);
    if (!target) { checkWinLose(); return; }

    switch (intent.type) {
      case 'attack': {
        doLunge(ef, target, () => {
          let dmg = Math.max(1, Math.floor(intent.dmg * (0.85 + Math.random() * 0.15)));
          if (ef.powers.weak > 0) dmg = Math.floor(dmg * 0.75);
          if (target.powers.vulnerable > 0) dmg = Math.floor(dmg * 1.5);
          applyDamage(target, dmg, intent.color);
          spawnParticles(target.x, target.y, 12, intent.color, 'spark', 7);
          if (intent.vuln) { target.powers.vulnerable = (target.powers.vulnerable || 0) + intent.vuln; spawnText(target.x, target.y - 70, `+${intent.vuln} VULN`, '#ff4488'); }
          if (target.hp <= 0) killFrog(target);
        }, () => { if (!checkWinLose()) setTimeout(nextEnemyAction, 300); });
        break;
      }
      case 'poison': {
        doLunge(ef, target, () => {
          let dmg = Math.max(1, Math.floor(intent.dmg * (0.85 + Math.random() * 0.15)));
          applyDamage(target, dmg, intent.color);
          target.powers.poison = (target.powers.poison || 0) + intent.poisonAmt;
          spawnText(target.x, target.y - 70, `+${intent.poisonAmt} PSN`, '#cc66ff');
          spawnParticles(target.x, target.y, 12, '#aa44ff', 'circle', 5);
          if (target.hp <= 0) killFrog(target);
        }, () => { if (!checkWinLose()) setTimeout(nextEnemyAction, 300); });
        break;
      }
      case 'heal': {
        ef.hp = Math.min(ef.maxHp, ef.hp + intent.heal);
        spawnText(ef.x, ef.y - 50, `+${intent.heal}`, '#44dd66');
        spawnParticles(ef.x, ef.y, 12, '#44ff66', 'circle', 4);
        setTimeout(nextEnemyAction, 500);
        break;
      }
      case 'block': {
        ef.block += intent.block;
        spawnText(ef.x, ef.y - 50, `+${intent.block} BLK`, '#4488ff');
        spawnParticles(ef.x, ef.y, 10, '#4488ff', 'star', 3);
        setTimeout(nextEnemyAction, 500);
        break;
      }
      case 'debuff': {
        if (intent.weak) {
          target.powers.weak = (target.powers.weak || 0) + intent.weak;
          spawnText(target.x, target.y - 50, `+${intent.weak} WEAK`, '#8866aa');
          spawnParticles(target.x, target.y, 8, '#8866aa', 'circle', 3);
        }
        setTimeout(nextEnemyAction, 500);
        break;
      }
      default: setTimeout(nextEnemyAction, 300);
    }
  }
  setTimeout(nextEnemyAction, 200);
}

function randomAlive(team) {
  const a = team.filter(f => f.alive);
  return a.length ? a[Math.floor(Math.random() * a.length)] : null;
}

// ============================================================
//  DRAWING
// ============================================================
function drawBG() {
  if (bgCanvas) ctx.drawImage(bgCanvas, 0, 0);
  else { ctx.fillStyle = '#4a9a30'; ctx.fillRect(0, 0, W, H); }
}

function drawFrog(f) {
  if (!f.alive) return;
  const img = images[f.imgKey]; if (!img) return;
  const fd = FRAME_DATA[f.frame];
  ctx.save();
  const dx = f.x, dy = f.y;

  // Shadow
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(dx, dy + fd.h * f.scale / 2 + 8, 35 * f.scaleX, 10, 0, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.translate(dx, dy);
  ctx.scale(f.isPlayer ? f.scaleX : -f.scaleX, f.scaleY);

  if (f.flash > 0) ctx.globalAlpha = 0.6 + 0.4 * Math.sin(f.flash * 0.06);
  const bounce = Math.sin(performance.now() * 0.003 + f.slot * 2.1) * 3;
  ctx.drawImage(img, fd.x, fd.y, fd.w, fd.h, -fd.w * f.scale / 2, -fd.h * f.scale / 2 + bounce, fd.w * f.scale, fd.h * f.scale);

  if (f.flash > 0) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = f.flashColor; ctx.globalAlpha = f.flash / 500;
    ctx.fillRect(-fd.w * f.scale / 2, -fd.h * f.scale / 2 + bounce, fd.w * f.scale, fd.h * f.scale);
  }
  ctx.restore();

  // Block aura
  if (f.block > 0) {
    ctx.save(); ctx.globalAlpha = 0.2 + 0.1 * Math.sin(performance.now() * 0.005);
    ctx.strokeStyle = '#44aaff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(dx, dy, 50, 40, 0, 0, 6.28); ctx.stroke();
    ctx.restore();
  }
}

function drawFrogHP(f) {
  if (!f.alive) return;
  const bw = 60, bh = 8;
  const bx = f.x - bw / 2, by = f.y - f.scale * 30 - 18;
  const pct = Math.max(0, f.hp / f.maxHp);
  const col = pct > 0.5 ? '#44dd55' : pct > 0.25 ? '#ddaa33' : '#dd3333';

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; rrect(bx - 1, by - 1, bw + 2, bh + 2, 4, true, false);
  // Fill
  if (pct > 0) { ctx.fillStyle = col; rrect(bx, by, bw * pct, bh, 3, true, false); }
  // HP number
  ctx.font = 'bold 11px "Segoe UI"'; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.strokeText(f.hp, f.x, by - 3); ctx.fillText(f.hp, f.x, by - 3);

  // Status icons
  const keys = Object.keys(f.powers);
  for (let i = 0; i < keys.length; i++) {
    const d = POWER_DEFS[keys[i]]; if (!d) continue;
    const sx = f.x - (keys.length * 10) + i * 20;
    const sy = by + bh + 14;
    ctx.globalAlpha = 0.85; ctx.fillStyle = d.color;
    ctx.beginPath(); ctx.arc(sx, sy, 8, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 8px "Segoe UI"'; ctx.textAlign = 'center';
    ctx.fillText(f.powers[keys[i]], sx, sy + 3);
    ctx.globalAlpha = 1;
  }
}

function drawEnemyIntents() {
  if (gameState === 'win' || gameState === 'lose') return;
  for (let i = 0; i < enemyTeam.length; i++) {
    const f = enemyTeam[i]; if (!f.alive || !enemyIntents[i]) continue;
    const intent = enemyIntents[i];
    const ix = f.x, iy = f.y - f.scale * 30 - 48;

    ctx.save(); ctx.globalAlpha = 0.75; ctx.textAlign = 'center';
    // Bubble
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.strokeStyle = intent.color + '88'; ctx.lineWidth = 1.5;
    rrect(ix - 28, iy - 6, 56, 22, 11, true, true);
    // Icon + value
    ctx.font = '11px Arial'; ctx.fillStyle = '#fff';
    if (intent.dmg) ctx.fillText(`⚔️${intent.dmg}`, ix, iy + 11);
    else if (intent.heal) ctx.fillText(`💚${intent.heal}`, ix, iy + 11);
    else if (intent.block) ctx.fillText(`🛡️${intent.block}`, ix, iy + 11);
    else if (intent.weak) ctx.fillText(`😩${intent.weak}`, ix, iy + 11);
    ctx.restore();
  }
}

function drawActiveCard() {
  if (!activeCard || activeCardTimer <= 0) return;
  const a = Math.min(1, activeCardTimer / 400);
  ctx.save(); ctx.globalAlpha = a;
  const cx = W / 2, cy = 65;
  // Card preview at top center (like Axie)
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; rrect(cx - 55, cy - 50, 110, 100, 12, true, false);
  ctx.strokeStyle = activeCard.color; ctx.lineWidth = 2; rrect(cx - 55, cy - 50, 110, 100, 12, false, true);
  ctx.font = '22px Arial'; ctx.textAlign = 'center'; ctx.fillText(activeCard.icon, cx, cy - 10);
  ctx.font = 'bold 12px "Segoe UI"'; ctx.fillStyle = '#fff'; ctx.fillText(activeCard.name, cx, cy + 12);
  ctx.font = '10px "Segoe UI"'; ctx.fillStyle = '#ccc'; ctx.fillText(activeCard.desc, cx, cy + 28);
  ctx.restore();
}

function drawHandCards() {
  if (gameState !== 'playerTurn') return;
  const cardW = 120, cardH = 170, gap = 10;
  const totalW = hand.length * (cardW + gap) - gap;
  const startX = Math.max(80, (W - totalW) / 2);
  const baseY = H - cardH - 12;

  for (let i = 0; i < hand.length; i++) {
    const card = hand[i];
    const isHov = i === hoveredCard;
    const canA = canPlayCard(card);
    const x = startX + i * (cardW + gap);
    const y = isHov ? baseY - 30 : baseY;

    ctx.save();

    // Card shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; rrect(x + 4, y + 4, cardW, cardH, 14, true, false);

    // Card bg — warm gradient like Axie cards
    const cg = ctx.createLinearGradient(x, y, x, y + cardH);
    cg.addColorStop(0, canA ? '#f5e6d0' : '#aaa8a0');
    cg.addColorStop(1, canA ? '#e8d0b0' : '#908880');
    ctx.fillStyle = cg;
    ctx.strokeStyle = isHov && canA ? '#ffcc44' : canA ? card.color : '#666';
    ctx.lineWidth = isHov ? 3 : 2;
    rrect(x, y, cardW, cardH, 14, true, true);

    ctx.globalAlpha = canA ? 1 : 0.4;

    // Creature portrait area (top half of card)
    const pGrad = ctx.createLinearGradient(x, y + 8, x, y + 80);
    pGrad.addColorStop(0, card.color + '44');
    pGrad.addColorStop(1, card.color + '22');
    ctx.fillStyle = pGrad;
    rrect(x + 6, y + 6, cardW - 12, 72, 10, true, false);

    // Draw the frog sprite on the card
    const sImg = images[card.sprite];
    if (sImg) {
      const sf = FRAME_DATA[0];
      ctx.drawImage(sImg, sf.x, sf.y, sf.w, sf.h, x + 20, y + 12, 80, 60);
    }

    // Cost bubble (top-left, colored like Axie)
    ctx.beginPath(); ctx.arc(x + 16, y + 16, 14, 0, 6.28);
    ctx.fillStyle = canA ? card.color : '#666'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.font = 'bold 15px "Segoe UI"'; ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.fillText(card.cost, x + 16, y + 21);

    // Card name bar
    ctx.fillStyle = card.color; rrect(x + 4, y + 80, cardW - 8, 24, 0, true, false);
    ctx.font = 'bold 12px "Segoe UI"'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText(card.name, x + cardW / 2, y + 96);

    // Description
    ctx.font = '10px "Segoe UI"'; ctx.fillStyle = '#5a4a3a'; ctx.textAlign = 'center';
    ctx.fillText(card.desc, x + cardW / 2, y + 120);

    // Damage/effect number
    if (card.baseDmg) {
      ctx.font = 'bold 22px "Segoe UI"'; ctx.fillStyle = '#c03020';
      ctx.fillText(card.baseDmg, x + cardW / 2, y + 152);
    } else if (card.heal) {
      ctx.font = 'bold 22px "Segoe UI"'; ctx.fillStyle = '#33aa44';
      ctx.fillText(card.heal, x + cardW / 2, y + 152);
    } else if (card.block) {
      ctx.font = 'bold 22px "Segoe UI"'; ctx.fillStyle = '#3377cc';
      ctx.fillText(card.block, x + cardW / 2, y + 152);
    }

    ctx.restore();
  }
}

function drawEnergyVase() {
  const vx = 42, vy = H - 95;
  // Vase shape
  ctx.save();
  ctx.fillStyle = '#8899aa';
  ctx.beginPath();
  ctx.moveTo(vx - 18, vy); ctx.quadraticCurveTo(vx - 22, vy + 30, vx - 16, vy + 45);
  ctx.lineTo(vx + 16, vy + 45); ctx.quadraticCurveTo(vx + 22, vy + 30, vx + 18, vy);
  ctx.closePath(); ctx.fill();
  // Rim
  ctx.fillStyle = '#99aabb';
  ctx.beginPath(); ctx.ellipse(vx, vy, 20, 6, 0, 0, 6.28); ctx.fill();
  // Liquid fill (energy)
  const fillPct = energy / ENERGY_MAX;
  if (fillPct > 0) {
    ctx.fillStyle = '#44aaff';
    const fh = 40 * fillPct;
    ctx.beginPath();
    ctx.moveTo(vx - 16, vy + 45 - fh); ctx.quadraticCurveTo(vx - 17, vy + 45, vx - 16, vy + 45);
    ctx.lineTo(vx + 16, vy + 45); ctx.quadraticCurveTo(vx + 17, vy + 45, vx + 16, vy + 45 - fh);
    ctx.closePath(); ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.ellipse(vx - 5, vy + 45 - fh + 5, 6, 3, 0, 0, 6.28); ctx.fill();
  }
  // Energy number
  ctx.font = 'bold 18px "Segoe UI"'; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#226'; ctx.lineWidth = 3;
  ctx.strokeText(energy, vx, vy + 30); ctx.fillText(energy, vx, vy + 30);
  ctx.restore();
}

function drawEndTurnBtn() {
  if (gameState !== 'playerTurn') return;
  const bx = W - 75, by = H - 85, br = 38;
  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(bx + 2, by + 3, br, 0, 6.28); ctx.fill();
  // Button
  const grad = ctx.createRadialGradient(bx, by - 5, 5, bx, by, br);
  grad.addColorStop(0, endTurnHovered ? '#ff5544' : '#e84030');
  grad.addColorStop(1, endTurnHovered ? '#cc3322' : '#b82818');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(bx, by, br, 0, 6.28); ctx.fill();
  // Border
  ctx.strokeStyle = '#ffaa88'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(bx, by, br, 0, 6.28); ctx.stroke();
  // Text
  ctx.font = 'bold 13px "Segoe UI"'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
  ctx.fillText('End', bx, by - 3); ctx.fillText('Turn', bx, by + 13);
  ctx.restore();
}

function drawPlayerInfo() {
  // Top-left info panel (like Axie)
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; rrect(10, 8, 160, 35, 8, true, false);
  ctx.font = 'bold 14px "Segoe UI"'; ctx.textAlign = 'left'; ctx.fillStyle = '#fff';
  ctx.fillText('Player', 20, 25);
  ctx.font = '11px "Segoe UI"'; ctx.fillStyle = '#aaddff';
  ctx.fillText(`Lv. 05`, 20, 38);

}

function drawTurnCounter() {
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; rrect(W / 2 - 45, 6, 90, 28, 14, true, false);
  ctx.font = 'bold 14px "Segoe UI"'; ctx.fillStyle = '#fff';
  ctx.fillText(`Turn ${turnNumber}`, W / 2, 26);

}

function drawDeckDiscard() {
  ctx.save(); ctx.font = 'bold 13px "Segoe UI"'; ctx.textAlign = 'center';
  // Deck (bottom-left)
  ctx.fillStyle = '#5a3a1a'; rrect(8, H - 32, 30, 20, 5, true, false);
  ctx.fillStyle = '#fff'; ctx.fillText(drawPile.length, 23, H - 17);
  // Discard (bottom-right)
  ctx.fillStyle = '#5a3a1a'; rrect(W - 38, H - 32, 30, 20, 5, true, false);
  ctx.fillStyle = '#fff'; ctx.fillText(discardPile.length, W - 23, H - 17);
  ctx.restore();
}

function drawWinLose() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
  const isWin = gameState === 'win';
  ctx.textAlign = 'center';
  ctx.font = 'bold 56px "Segoe UI"'; ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
  const txt = isWin ? 'VICTORY!' : 'DEFEAT';
  ctx.strokeText(txt, W / 2, H / 2 - 30); ctx.fillStyle = isWin ? '#44dd66' : '#dd4444';
  ctx.fillText(txt, W / 2, H / 2 - 30);
  ctx.font = '20px "Segoe UI"'; ctx.fillStyle = '#ccc';
  ctx.fillText(isWin ? 'All enemy frogs defeated!' : 'Your team has fallen...', W / 2, H / 2 + 10);
  ctx.font = '14px "Segoe UI"'; ctx.fillStyle = '#888';
  ctx.fillText(`${turnNumber} turns`, W / 2, H / 2 + 40);
  // Restart
  const bx = W / 2 - 70, by = H / 2 + 60;
  ctx.fillStyle = restartHovered ? '#4455aa' : '#2a3366'; ctx.strokeStyle = '#5566aa'; ctx.lineWidth = 2;
  rrect(bx, by, 140, 40, 10, true, true);
  ctx.font = 'bold 16px "Segoe UI"'; ctx.fillStyle = '#fff'; ctx.fillText('PLAY AGAIN', W / 2, by + 27);
  if (Math.random() > 0.75) spawnParticles(Math.random() * W, Math.random() * H / 2, 1, isWin ? '#44dd66' : '#dd4444', 'star', 2);
  ctx.restore();
}

function rrect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
  if (fill) ctx.fill(); if (stroke) ctx.stroke();
}

// ============================================================
//  INPUT
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  hoveredCard = -1; endTurnHovered = false; restartHovered = false;
  canvas.style.cursor = 'default';

  if (gameState === 'playerTurn') {
    const cardW = 120, cardH = 170, gap = 10;
    const totalW = hand.length * (cardW + gap) - gap;
    const startX = Math.max(80, (W - totalW) / 2);
    const baseY = H - cardH - 12;
    for (let i = 0; i < hand.length; i++) {
      const x = startX + i * (cardW + gap);
      if (mx >= x && mx <= x + cardW && my >= baseY - 30 && my <= baseY + cardH) {
        hoveredCard = i;
        if (canPlayCard(hand[i])) canvas.style.cursor = 'pointer';
        break;
      }
    }
    // End turn button
    const bx = W - 75, by = H - 85;
    if (Math.hypot(mx - bx, my - by) < 38) { endTurnHovered = true; canvas.style.cursor = 'pointer'; }
  }

  if (gameState === 'win' || gameState === 'lose') {
    const bx = W / 2 - 70, by = H / 2 + 60;
    if (mx >= bx && mx <= bx + 140 && my >= by && my <= by + 40) { restartHovered = true; canvas.style.cursor = 'pointer'; }
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  if (gameState === 'playerTurn') {
    if (hoveredCard >= 0 && hand[hoveredCard] && canPlayCard(hand[hoveredCard])) {
      const card = hand[hoveredCard];
      // For attacks: target first alive enemy; for skills/powers: auto-target
      const target = card.type === 'attack' ? findClickedEnemy(mx, my) || aliveEnemyFrogs()[0] : aliveEnemyFrogs()[0];
      if (target || card.type !== 'attack') playCard(hoveredCard, target);
      return;
    }
    if (endTurnHovered) { endTurn(); return; }
  }
  if ((gameState === 'win' || gameState === 'lose') && restartHovered) init();
});

function findClickedEnemy(mx, my) {
  for (const f of aliveEnemyFrogs()) {
    if (Math.abs(mx - f.x) < 50 && Math.abs(my - f.y) < 50) return f;
  }
  return null;
}

// ============================================================
//  GAME LOOP
// ============================================================
let lastTime = 0;
function gameLoop(ts) {
  const dt = Math.min(50, ts - (lastTime || ts));
  lastTime = ts;

  // Update
  allFrogs().forEach(f => {
    f.frameTimer += dt;
    if (f.frameTimer >= f.animSpeed) { f.frameTimer = 0; f.frame = (f.frame + 1) % 6; }
    if (f.flash > 0) f.flash = Math.max(0, f.flash - dt);
  });
  if (activeCardTimer > 0) activeCardTimer -= dt;
  updateTweens(dt); updateShake(dt); updateParticles(dt); updateTexts(dt);

  // Draw
  ctx.save(); ctx.translate(camera.offsetX, camera.offsetY);
  ctx.clearRect(-10, -10, W + 20, H + 20);
  drawBG();
  // Draw frogs back-to-front (slot 2 first, then 1, then 0 = front)
  for (let s = 2; s >= 0; s--) {
    const pf = playerTeam[s], ef = enemyTeam[s];
    if (pf) drawFrog(pf);
    if (ef) drawFrog(ef);
  }
  // HP bars on top
  allFrogs().forEach(drawFrogHP);
  drawEnemyIntents();
  drawParticles(); drawTexts();
  ctx.restore();

  // UI (not affected by shake)
  drawHandCards(); drawEnergyVase(); drawEndTurnBtn();
  drawPlayerInfo(); drawTurnCounter(); drawDeckDiscard();
  drawActiveCard();

  if (gameState === 'win' || gameState === 'lose') drawWinLose();

  requestAnimationFrame(gameLoop);
}
</script>
