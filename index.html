<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frog Legends - Turn-Based Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a2a15; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { image-rendering: pixelated; border-radius: 14px; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script>
// ============================================================
//  FROG LEGENDS — PixiJS v8 + GSAP Axie-style 3v3 Battle
// ============================================================
const GW = 1100, GH = 680;
const FRAME_DATA = [
  { x: 19, y: 30, w: 77, h: 57 },
  { x: 147, y: 29, w: 77, h: 57 },
  { x: 276, y: 29, w: 77, h: 57 },
  { x: 405, y: 30, w: 77, h: 57 },
  { x: 533, y: 31, w: 77, h: 57 },
  { x: 659, y: 31, w: 77, h: 57 },
];

let app, gameContainer, uiContainer, particleContainer;
let frogTextures = {}; // { ember: [tex0..5], toxic: [...], frost: [...] }

// ============================================================
//  INIT
// ============================================================
(async () => {
  app = new PIXI.Application();
  await app.init({ background: '#4a9a30', width: GW, height: GH, antialias: true });
  document.body.appendChild(app.canvas);

  // Load sprite sheets
  const sheets = {
    ember: await PIXI.Assets.load('sprites/ember/ember_sheet_6frame.png'),
    toxic: await PIXI.Assets.load('sprites/toxic/toxic_sheet_6frame.png'),
    frost: await PIXI.Assets.load('sprites/frost/frost_sheet_6frame.png'),
  };

  // Extract frames from each sheet
  for (const [key, tex] of Object.entries(sheets)) {
    frogTextures[key] = FRAME_DATA.map(fd =>
      new PIXI.Texture({ source: tex.source, frame: new PIXI.Rectangle(fd.x, fd.y, fd.w, fd.h) })
    );
  }

  // Containers
  gameContainer = new PIXI.Container();
  particleContainer = new PIXI.Container();
  uiContainer = new PIXI.Container();
  app.stage.addChild(gameContainer, particleContainer, uiContainer);

  buildBackground();
  initGame();

  app.ticker.add((ticker) => {
    const dt = ticker.deltaTime * 16.67; // ms
    updateParticles(dt);
    updateFloatingTexts(dt);
    if (activeCardTimer > 0) activeCardTimer -= dt;
  });
})();

// ============================================================
//  BACKGROUND (procedural)
// ============================================================
function buildBackground() {
  const bg = new PIXI.Graphics();
  // Sky gradient (approximate with bands)
  const skyColors = [0x5ec8e5, 0x78d4a8, 0xa8e6a0];
  for (let i = 0; i < 20; i++) {
    const t = i / 20;
    const ci = Math.min(skyColors.length - 2, Math.floor(t * (skyColors.length - 1)));
    const ct = (t * (skyColors.length - 1)) - ci;
    const c = lerpColor(skyColors[ci], skyColors[ci + 1], ct);
    bg.rect(0, i * (GH * 0.55 / 20), GW, GH * 0.55 / 20 + 1).fill(c);
  }
  // Ground
  const gndColors = [0x5daa35, 0x4a9428, 0x3a7a1e];
  for (let i = 0; i < 15; i++) {
    const t = i / 15;
    const ci = Math.min(gndColors.length - 2, Math.floor(t * (gndColors.length - 1)));
    const ct = (t * (gndColors.length - 1)) - ci;
    const c = lerpColor(gndColors[ci], gndColors[ci + 1], ct);
    const yStart = GH * 0.5 + i * (GH * 0.5 / 15);
    bg.rect(0, yStart, GW, GH * 0.5 / 15 + 1).fill(c);
  }
  gameContainer.addChild(bg);

  // Background foliage (circles)
  for (let i = 0; i < 12; i++) {
    const bush = new PIXI.Graphics();
    const bx = i * 100 + (Math.random() - 0.5) * 50;
    const by = GH * 0.44 + Math.random() * 20;
    const br = 30 + Math.random() * 40;
    bush.circle(bx, by, br).fill(0x3a8825);
    bush.circle(bx + br * 0.4, by + 5, br * 0.7).fill(0x4a9a30);
    gameContainer.addChild(bush);
  }

  // Big trees on sides
  drawTree(-10, true);
  drawTree(GW + 10, false);

  // Clouds
  for (let i = 0; i < 5; i++) {
    const cloud = new PIXI.Graphics();
    const cx = 120 + Math.random() * (GW - 240), cy = 25 + Math.random() * 70;
    const cw = 50 + Math.random() * 80;
    cloud.circle(cx, cy, cw * 0.4).fill({ color: 0xffffff, alpha: 0.6 });
    cloud.circle(cx - cw * 0.25, cy + 4, cw * 0.3).fill({ color: 0xffffff, alpha: 0.5 });
    cloud.circle(cx + cw * 0.25, cy + 3, cw * 0.3).fill({ color: 0xffffff, alpha: 0.5 });
    gameContainer.addChild(cloud);
  }

  // Floating islands
  for (const [fx, fy, fw] of [[220, 90, 70], [700, 70, 90], [480, 55, 50], [880, 105, 60]]) {
    const isl = new PIXI.Graphics();
    isl.ellipse(fx, fy + 12, fw, 12).fill(0x5a9a38);
    isl.ellipse(fx, fy, fw * 0.9, 10).fill(0x6aaa44);
    // Tiny tree on island
    isl.rect(fx - 2, fy - 22, 4, 18).fill(0x5a3a1a);
    isl.circle(fx, fy - 28, 12).fill(0x4a9a30);
    gameContainer.addChild(isl);
  }

  // Light rays
  for (let i = 0; i < 4; i++) {
    const ray = new PIXI.Graphics();
    const rx = 200 + i * 200;
    ray.moveTo(rx, 0).lineTo(rx - 40, GH * 0.5).lineTo(rx + 40, GH * 0.5).closePath().fill({ color: 0xffffff, alpha: 0.04 });
    gameContainer.addChild(ray);
  }
}

function drawTree(x, isLeft) {
  const tree = new PIXI.Graphics();
  const dir = isLeft ? 1 : -1;
  // Trunk
  tree.rect(x - 20 * dir, GH * 0.2, 40, GH * 0.8).fill(0x5a3a1a);
  // Canopy layers
  tree.circle(x + 20 * dir, GH * 0.22, 80).fill(0x2d7a22);
  tree.circle(x - 10 * dir, GH * 0.15, 65).fill(0x3a8a2a);
  tree.circle(x + 35 * dir, GH * 0.1, 55).fill(0x4a9a35);
  tree.circle(x + 10 * dir, GH * 0.05, 45).fill(0x55aa40);
  // Vine
  tree.moveTo(x + 50 * dir, GH * 0.2).quadraticCurveTo(x + 65 * dir, GH * 0.35, x + 45 * dir, GH * 0.45).stroke({ color: 0x3a8825, width: 3 });
  gameContainer.addChild(tree);
}

function lerpColor(a, b, t) {
  const ar = (a >> 16) & 0xff, ag = (a >> 8) & 0xff, ab = a & 0xff;
  const br2 = (b >> 16) & 0xff, bg2 = (b >> 8) & 0xff, bb = b & 0xff;
  const r = Math.round(ar + (br2 - ar) * t);
  const g = Math.round(ag + (bg2 - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return (r << 16) | (g << 8) | bl;
}

// ============================================================
//  PARTICLES (custom lightweight system)
// ============================================================
const particles = [];
function spawnParticles(x, y, count, color, spread = 5) {
  for (let i = 0; i < count; i++) {
    const g = new PIXI.Graphics();
    const sz = 2 + Math.random() * 4;
    g.circle(0, 0, sz).fill(color);
    g.x = x + (Math.random() - 0.5) * 25;
    g.y = y + (Math.random() - 0.5) * 25;
    particleContainer.addChild(g);
    particles.push({
      g, vx: (Math.random() - 0.5) * spread, vy: (Math.random() - 1) * spread,
      life: 400 + Math.random() * 400, maxLife: 0
    });
    particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.g.x += p.vx * dt / 16; p.g.y += p.vy * dt / 16;
    p.vy += 0.1 * dt / 16; p.life -= dt;
    p.g.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) { particleContainer.removeChild(p.g); p.g.destroy(); particles.splice(i, 1); }
  }
}

// ============================================================
//  FLOATING DAMAGE TEXTS
// ============================================================
const floatingTexts = [];
function spawnDmgText(x, y, text, color, scale = 1.5) {
  const t = new PIXI.Text({ text, style: { fontFamily: 'Segoe UI, Arial', fontSize: Math.round(18 * scale), fontWeight: 'bold', fill: color, stroke: { color: '#000000', width: 4 }, align: 'center' } });
  t.anchor.set(0.5); t.x = x + (Math.random() - 0.5) * 30; t.y = y;
  particleContainer.addChild(t);
  floatingTexts.push({ t, vy: -2.5, life: 1200, maxLife: 1200 });
  // Pop animation
  gsap.from(t.scale, { x: 0.3, y: 0.3, duration: 0.2, ease: 'back.out(3)' });
}
function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i];
    f.t.y += f.vy * dt / 16; f.vy *= 0.98; f.life -= dt;
    f.t.alpha = Math.max(0, f.life / f.maxLife);
    if (f.life <= 0) { particleContainer.removeChild(f.t); f.t.destroy(); floatingTexts.splice(i, 1); }
  }
}

// ============================================================
//  POWER / BUFF SYSTEM
// ============================================================
const POWER_DEFS = {
  strength:   { name: 'STR',  color: 0xff6644 },
  weak:       { name: 'WEAK', color: 0x8866aa },
  vulnerable: { name: 'VULN', color: 0xff4488 },
  poison:     { name: 'PSN',  color: 0xaa44ff },
  regen:      { name: 'RGN',  color: 0x44dd66 },
};

// ============================================================
//  DAMAGE PIPELINE
// ============================================================
function calcDamage(base, atk, def) {
  let dmg = base + (atk.powers.strength || 0);
  if (atk.powers.weak > 0) dmg = Math.floor(dmg * 0.75);
  const isCrit = Math.random() < 0.08;
  if (isCrit) dmg = Math.floor(dmg * 1.5);
  dmg = Math.floor(dmg * (0.85 + Math.random() * 0.15));
  if (def.powers.vulnerable > 0) dmg = Math.floor(dmg * 1.5);
  return { dmg: Math.max(1, dmg), isCrit };
}

function applyDamage(target, rawDmg, color = '#ff4444', isCrit = false) {
  let dmg = rawDmg;
  if (target.block > 0) {
    const blocked = Math.min(target.block, dmg); target.block -= blocked; dmg -= blocked;
    if (blocked > 0) { spawnDmgText(target.sprite.x, target.sprite.y - 50, `${blocked} BLK`, '#4488ff'); spawnParticles(target.sprite.x, target.sprite.y, 5, 0x4488ff); }
    updateHPBar(target);
  }
  if (dmg > 0) {
    target.hp = Math.max(0, target.hp - dmg);
    // Squash/stretch
    gsap.to(target.sprite.scale, { x: target.isPlayer ? 1.3 : -1.3, y: 0.7, duration: 0.05, onComplete: () => {
      gsap.to(target.sprite.scale, { x: target.isPlayer ? 1 : -1, y: 1, duration: 0.5, ease: 'elastic.out(1,0.3)' });
    }});
    // Flash tint
    target.anim.tint = 0xff0000;
    gsap.delayedCall(0.15, () => { if (target.anim) target.anim.tint = 0xffffff; });
    // Screen shake
    const pow = Math.min(3 + dmg * 0.3, 14);
    shakeScreen(pow, 250);
    updateHPBar(target);
  }
  const label = isCrit ? `${rawDmg}!` : `${rawDmg}`;
  spawnDmgText(target.sprite.x, target.sprite.y - 40, label, isCrit ? '#ffff00' : color, isCrit ? 2.2 : 1.7);
  if (isCrit) spawnParticles(target.sprite.x, target.sprite.y, 18, 0xffff00, 8);
  return dmg;
}

function shakeScreen(power, dur) {
  const orig = { x: gameContainer.x, y: gameContainer.y };
  let elapsed = 0;
  const fn = (ticker) => {
    elapsed += ticker.deltaTime * 16.67;
    const p = power * (1 - elapsed / dur);
    gameContainer.x = orig.x + (Math.random() * 2 - 1) * p;
    gameContainer.y = orig.y + (Math.random() * 2 - 1) * p;
    if (elapsed >= dur) { gameContainer.x = orig.x; gameContainer.y = orig.y; app.ticker.remove(fn); }
  };
  app.ticker.add(fn);
}

// ============================================================
//  CARD DEFINITIONS
// ============================================================
const CARD_DEFS = [
  { name: 'Slash',      cost: 1, baseDmg: 10, type: 'attack', powers: {},                color: '#e85d3a', desc: 'Deal 10 damage', sprite: 'ember' },
  { name: 'Fireball',   cost: 2, baseDmg: 18, type: 'attack', powers: {},                color: '#e83a2a', desc: '18 fire damage', sprite: 'ember' },
  { name: 'Bite',       cost: 1, baseDmg: 7,  type: 'attack', powers: {},                color: '#e8a03a', desc: '7 dmg x2 hits', sprite: 'ember', multi: 2 },
  { name: 'Heavy Slam', cost: 2, baseDmg: 22, type: 'attack', powers: { vulnerable: 1 }, color: '#cc5533', desc: '22 dmg + Vuln', sprite: 'ember' },
  { name: 'Venom Spit', cost: 2, baseDmg: 8,  type: 'attack', powers: { poison: 4 },     color: '#aa44ff', desc: '8 dmg + 4 PSN', sprite: 'toxic' },
  { name: 'Heal',       cost: 1, heal: 15,    type: 'skill',  powers: {},                color: '#44bb55', desc: 'Heal 15 HP', sprite: 'frost' },
  { name: 'Shield',     cost: 1, block: 10,   type: 'skill',  powers: {},                color: '#4488cc', desc: 'Gain 10 Block', sprite: 'frost' },
  { name: 'Rage',       cost: 1, type: 'power', powers: { strength: 2 }, selfPowers: true, color: '#e86830', desc: '+2 Strength', sprite: 'ember' },
  { name: 'Regen',      cost: 1, type: 'power', powers: { regen: 3 }, selfPowers: true,   color: '#44cc66', desc: '+3 Regen', sprite: 'frost' },
  { name: 'Acid Bath',  cost: 2, baseDmg: 12, type: 'attack', powers: { weak: 2 },       color: '#88cc22', desc: '12 dmg + 2 Weak', sprite: 'toxic' },
  { name: 'Soul Drain', cost: 3, baseDmg: 20, type: 'attack', powers: {},                color: '#cc44aa', desc: '20 dmg, heal 50%', sprite: 'ember', drain: true },
];

// ============================================================
//  DECK SYSTEM
// ============================================================
let drawPile = [], hand = [], discardPile = [];
function buildDeck() {
  const deck = [];
  for (const d of CARD_DEFS) for (let i = 0; i < 2; i++) deck.push({ ...d, id: Math.random().toString(36).substr(2, 9) });
  shuffle(deck); drawPile = deck; hand = []; discardPile = [];
}
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } }
function drawCards(n) {
  for (let i = 0; i < n; i++) {
    if (!drawPile.length) { drawPile = [...discardPile]; discardPile = []; shuffle(drawPile); }
    if (drawPile.length && hand.length < 6) hand.push(drawPile.pop());
  }
}

// ============================================================
//  ENEMY INTENTS
// ============================================================
const ENEMY_INTENTS = [
  { name: 'Claw', type: 'attack', dmg: 10, color: '#e85d3a' },
  { name: 'Venom', type: 'poison', dmg: 6, poisonAmt: 4, color: '#aa44ff' },
  { name: 'Heal', type: 'heal', heal: 12, color: '#44bb55' },
  { name: 'Shell', type: 'block', block: 10, color: '#4488cc' },
  { name: 'Slam', type: 'attack', dmg: 16, color: '#cc5533', vuln: 1 },
  { name: 'Acid', type: 'debuff', weak: 2, color: '#88cc22' },
];
let enemyIntents = [];
function rollIntent(f) {
  const hp = f.hp / f.maxHp;
  const w = hp < 0.3 ? [1,0,4,2,0,0] : hp < 0.6 ? [2,1,1,2,2,1] : [3,2,0,1,2,2];
  const tot = w.reduce((a, b) => a + b); let r = Math.random() * tot;
  for (let i = 0; i < w.length; i++) { r -= w[i]; if (r <= 0) return { ...ENEMY_INTENTS[i] }; }
  return { ...ENEMY_INTENTS[0] };
}

// ============================================================
//  GAME STATE
// ============================================================
const ENERGY_MAX = 3;
let gameState = 'loading', turnNumber = 0, energy = ENERGY_MAX;
let playerTeam = [], enemyTeam = [];
let cardSprites = []; // UI card containers
let activeCardTimer = 0;
let hpBars = new Map(); // frog -> { bg, fg, text, container }
let intentSprites = new Map();
let energyText, turnText, deckText, discardText;
let endTurnBtn;

function createFrog(name, hp, imgKey, isPlayer, slot) {
  const px = isPlayer ? [180, 260, 330][slot] : [GW - 180, GW - 260, GW - 330][slot];
  const py = isPlayer ? [380, 320, 410][slot] : [380, 320, 410][slot];
  const sc = [2.8, 2.4, 2.0][slot];

  const container = new PIXI.Container();
  container.x = px; container.y = py;
  container.sortableChildren = true;

  // Animated sprite
  const anim = new PIXI.AnimatedSprite(frogTextures[imgKey]);
  anim.animationSpeed = 0.12 + slot * 0.02;
  anim.anchor.set(0.5);
  anim.scale.set(sc);
  anim.play();
  container.addChild(anim);

  // Mirror enemies
  if (!isPlayer) container.scale.x = -1;

  // Shadow
  const shadow = new PIXI.Graphics();
  shadow.ellipse(0, sc * 28 + 5, 35, 8).fill({ color: 0x000000, alpha: 0.25 });
  shadow.zIndex = -1;
  container.addChild(shadow);

  // Idle bob
  const bobOffset = slot * 2;
  app.ticker.add(() => {
    anim.y = Math.sin(performance.now() * 0.003 + bobOffset) * 3;
  });

  // Click handler for targeting
  container.eventMode = 'static';
  container.cursor = 'pointer';
  container.hitArea = new PIXI.Rectangle(-50, -50, 100, 100);

  gameContainer.addChild(container);

  const frog = {
    name, hp, maxHp: hp, block: 0, powers: {}, alive: true,
    imgKey, isPlayer, slot, sprite: container, anim,
    baseX: px, baseY: py
  };

  // Build HP bar
  buildHPBar(frog);

  return frog;
}

// ============================================================
//  HP BARS (PixiJS Graphics)
// ============================================================
function buildHPBar(frog) {
  const cont = new PIXI.Container();
  const bw = 65, bh = 9;
  cont.x = frog.sprite.x - bw / 2;
  cont.y = frog.sprite.y - frog.slot === 0 ? 90 : frog.slot === 1 ? 75 : 60;
  // Fix y position
  cont.y = frog.sprite.y - [90, 80, 65][frog.slot];
  if (!frog.isPlayer) cont.x = frog.sprite.x + bw / 2; // adjust for mirrored

  const bg = new PIXI.Graphics().roundRect(0, 0, bw, bh, 4).fill(0x222222);
  bg.alpha = 0.7;
  const fg = new PIXI.Graphics().roundRect(0, 0, bw, bh, 4).fill(0x44dd55);
  const text = new PIXI.Text({ text: `${frog.hp}`, style: { fontFamily: 'Segoe UI', fontSize: 12, fontWeight: 'bold', fill: '#ffffff', stroke: { color: '#000000', width: 3 } } });
  text.anchor.set(0.5); text.x = bw / 2; text.y = -10;

  cont.addChild(bg, fg, text);

  // For enemy (mirrored container), adjust position
  if (!frog.isPlayer) {
    cont.x = frog.sprite.x - bw / 2;
  }

  uiContainer.addChild(cont);
  hpBars.set(frog, { bg, fg, text, container: cont, width: bw, height: bh });
  updateHPBar(frog);
}

function updateHPBar(frog) {
  const bar = hpBars.get(frog);
  if (!bar) return;
  const pct = Math.max(0, frog.hp / frog.maxHp);
  const color = pct > 0.5 ? 0x44dd55 : pct > 0.25 ? 0xddaa33 : 0xdd3333;
  bar.fg.clear().roundRect(0, 0, bar.width * pct, bar.height, 4).fill(color);
  bar.text.text = `${Math.max(0, frog.hp)}`;
  // Block indicator
  if (frog.block > 0) bar.text.text = `${frog.hp} (+${frog.block})`;

  // Update position to follow frog
  bar.container.x = frog.sprite.x - bar.width / 2;
  bar.container.y = frog.sprite.y - [90, 80, 65][frog.slot];

  if (!frog.alive) bar.container.visible = false;
}

// ============================================================
//  ENEMY INTENT DISPLAY
// ============================================================
function buildIntentDisplay(frog, intent) {
  const old = intentSprites.get(frog);
  if (old) { uiContainer.removeChild(old); old.destroy(); }

  if (!intent || !frog.alive) return;

  const cont = new PIXI.Container();
  cont.x = frog.sprite.x;
  cont.y = frog.sprite.y - [110, 100, 85][frog.slot];

  const bg = new PIXI.Graphics().roundRect(-30, -10, 60, 24, 12).fill({ color: 0x000000, alpha: 0.55 });
  cont.addChild(bg);

  let label = '';
  if (intent.dmg) label = `⚔ ${intent.dmg}`;
  else if (intent.heal) label = `♥ ${intent.heal}`;
  else if (intent.block) label = `🛡 ${intent.block}`;
  else if (intent.weak) label = `▼ ${intent.weak}`;

  const txt = new PIXI.Text({ text: label, style: { fontFamily: 'Segoe UI', fontSize: 11, fontWeight: 'bold', fill: '#ffffff' } });
  txt.anchor.set(0.5); txt.y = 2;
  cont.addChild(txt);

  uiContainer.addChild(cont);
  intentSprites.set(frog, cont);
}

// ============================================================
//  CARDS UI (PixiJS containers)
// ============================================================
function rebuildHandUI() {
  // Clear old cards
  cardSprites.forEach(c => { uiContainer.removeChild(c); c.destroy({ children: true }); });
  cardSprites = [];

  if (gameState !== 'playerTurn') return;

  const cardW = 115, cardH = 165, gap = 8;
  const totalW = hand.length * (cardW + gap) - gap;
  const startX = Math.max(80, (GW - totalW) / 2);
  const baseY = GH - cardH - 10;

  hand.forEach((card, i) => {
    const cont = new PIXI.Container();
    cont.x = startX + i * (cardW + gap);
    cont.y = baseY;
    cont.eventMode = 'static';
    cont.cursor = card.cost <= energy ? 'pointer' : 'default';
    cont.hitArea = new PIXI.Rectangle(0, 0, cardW, cardH);

    const canAfford = card.cost <= energy;
    const alpha = canAfford ? 1 : 0.4;

    // Card bg (warm parchment like Axie)
    const cbg = new PIXI.Graphics().roundRect(0, 0, cardW, cardH, 12).fill(canAfford ? 0xf0e0c8 : 0xa09888);
    cbg.roundRect(0, 0, cardW, cardH, 12).stroke({ color: parseInt(card.color.replace('#', ''), 16), width: 2 });
    cont.addChild(cbg);

    // Portrait area
    const portrait = new PIXI.Graphics().roundRect(5, 5, cardW - 10, 68, 8).fill(parseInt(card.color.replace('#', ''), 16) + 0x333333 & 0xffffff);
    portrait.alpha = 0.25;
    cont.addChild(portrait);

    // Frog sprite on card
    if (frogTextures[card.sprite]) {
      const frogImg = new PIXI.Sprite(frogTextures[card.sprite][0]);
      frogImg.anchor.set(0.5);
      frogImg.x = cardW / 2; frogImg.y = 40;
      frogImg.scale.set(1.2);
      frogImg.alpha = alpha;
      cont.addChild(frogImg);
    }

    // Cost bubble
    const costBg = new PIXI.Graphics().circle(15, 15, 13).fill(parseInt(card.color.replace('#', ''), 16));
    costBg.circle(15, 15, 13).stroke({ color: 0xffffff, width: 2 });
    cont.addChild(costBg);
    const costTxt = new PIXI.Text({ text: `${card.cost}`, style: { fontFamily: 'Segoe UI', fontSize: 14, fontWeight: 'bold', fill: '#ffffff' } });
    costTxt.anchor.set(0.5); costTxt.x = 15; costTxt.y = 15;
    cont.addChild(costTxt);

    // Name bar
    const nameBar = new PIXI.Graphics().rect(3, 76, cardW - 6, 22).fill(parseInt(card.color.replace('#', ''), 16));
    cont.addChild(nameBar);
    const nameTxt = new PIXI.Text({ text: card.name, style: { fontFamily: 'Segoe UI', fontSize: 11, fontWeight: 'bold', fill: '#ffffff' } });
    nameTxt.anchor.set(0.5, 0); nameTxt.x = cardW / 2; nameTxt.y = 78;
    cont.addChild(nameTxt);

    // Description
    const descTxt = new PIXI.Text({ text: card.desc, style: { fontFamily: 'Segoe UI', fontSize: 9, fill: '#5a4a3a' } });
    descTxt.anchor.set(0.5, 0); descTxt.x = cardW / 2; descTxt.y = 103;
    descTxt.alpha = alpha;
    cont.addChild(descTxt);

    // Damage number
    let valText = '';
    let valColor = '#c03020';
    if (card.baseDmg) { valText = `${card.baseDmg}`; valColor = '#c03020'; }
    else if (card.heal) { valText = `${card.heal}`; valColor = '#33aa44'; }
    else if (card.block) { valText = `${card.block}`; valColor = '#3377cc'; }
    if (valText) {
      const valTxt = new PIXI.Text({ text: valText, style: { fontFamily: 'Segoe UI', fontSize: 22, fontWeight: 'bold', fill: valColor } });
      valTxt.anchor.set(0.5); valTxt.x = cardW / 2; valTxt.y = 143;
      valTxt.alpha = alpha;
      cont.addChild(valTxt);
    }

    // Hover effect
    cont.on('pointerover', () => {
      if (canAfford) gsap.to(cont, { y: baseY - 30, duration: 0.15, ease: 'back.out(2)' });
    });
    cont.on('pointerout', () => {
      gsap.to(cont, { y: baseY, duration: 0.15 });
    });

    // Click
    cont.on('pointerdown', () => {
      if (!canAfford || gameState !== 'playerTurn') return;
      const target = aliveEnemyFrogs()[0];
      if (card.type === 'attack' && !target) return;
      playCard(i, target);
    });

    uiContainer.addChild(cont);
    cardSprites.push(cont);

    // Entrance animation
    cont.alpha = 0; cont.y = baseY + 50;
    gsap.to(cont, { alpha: 1, y: baseY, duration: 0.3, delay: i * 0.05, ease: 'back.out(2)' });
  });
}

// ============================================================
//  ENERGY VASE
// ============================================================
let energyContainer;
function buildEnergyUI() {
  if (energyContainer) { uiContainer.removeChild(energyContainer); energyContainer.destroy({ children: true }); }
  energyContainer = new PIXI.Container();
  energyContainer.x = 42; energyContainer.y = GH - 90;

  // Vase
  const vase = new PIXI.Graphics();
  vase.moveTo(-18, 0).quadraticCurveTo(-22, 30, -16, 45).lineTo(16, 45).quadraticCurveTo(22, 30, 18, 0).closePath().fill(0x8899aa);
  vase.ellipse(0, 0, 20, 6).fill(0x99aabb);
  energyContainer.addChild(vase);

  // Liquid
  const fillPct = energy / ENERGY_MAX;
  if (fillPct > 0) {
    const liq = new PIXI.Graphics();
    const fh = 40 * fillPct;
    liq.roundRect(-14, 45 - fh, 28, fh, 3).fill(0x44aaff);
    liq.ellipse(-4, 45 - fh + 4, 5, 2).fill({ color: 0xffffff, alpha: 0.3 });
    energyContainer.addChild(liq);
  }

  // Number
  const eTxt = new PIXI.Text({ text: `${energy}`, style: { fontFamily: 'Segoe UI', fontSize: 18, fontWeight: 'bold', fill: '#ffffff', stroke: { color: '#223366', width: 3 } } });
  eTxt.anchor.set(0.5); eTxt.y = 28;
  energyContainer.addChild(eTxt);

  uiContainer.addChild(energyContainer);
}

function updateHUD() {
  if (turnText) turnText.text = `Turn ${turnNumber}`;
  if (deckText) deckText.text = `${drawPile.length}`;
  if (discardText) discardText.text = `${discardPile.length}`;

// ============================================================
//  GAME LOGIC
// ============================================================
function initGame() {
  playerTeam = [
    createFrog('Ember', 55, 'ember', true, 0),
    createFrog('Frost', 50, 'frost', true, 1),
    createFrog('Toxic', 48, 'toxic', true, 2),
  ];
  enemyTeam = [
    createFrog('Venom', 48, 'toxic', false, 0),
    createFrog('Blaze', 44, 'ember', false, 1),
    createFrog('Ice',   42, 'frost', false, 2),
  ];
  energy = ENERGY_MAX;
  turnNumber = 0;
  buildDeck();
  enemyIntents = enemyTeam.map(f => rollIntent(f));
  buildHUD();
  startPlayerTurn();
  gameState = 'playerTurn';
}

function alivePlayerFrogs() { return playerTeam.filter(f => f.alive); }
function aliveEnemyFrogs() { return enemyTeam.filter(f => f.alive); }

function startPlayerTurn() {
  turnNumber++; energy = ENERGY_MAX;
  playerTeam.forEach(f => { if (f.alive) { f.block = 0; processTurnStart(f); } });
  drawCards(4);
  rebuildHandUI();
  buildEnergyUI();
  buildEndTurnBtn();
  updateHUD();
  enemyTeam.forEach((f, i) => { if (f.alive) buildIntentDisplay(f, enemyIntents[i]); });
  // Update all HP bars
  [...playerTeam, ...enemyTeam].forEach(updateHPBar);
}

function processTurnStart(f) {
  if (f.powers.poison > 0) {
    f.hp = Math.max(0, f.hp - f.powers.poison);
    spawnDmgText(f.sprite.x, f.sprite.y - 50, `${f.powers.poison} PSN`, '#cc66ff');
    spawnParticles(f.sprite.x, f.sprite.y, 6, 0xaa44ff);
    f.powers.poison--;
    if (f.powers.poison <= 0) delete f.powers.poison;
    if (f.hp <= 0) killFrog(f);
    updateHPBar(f);
  }
  if (f.powers.regen > 0 && f.alive) {
    f.hp = Math.min(f.maxHp, f.hp + f.powers.regen);
    spawnDmgText(f.sprite.x, f.sprite.y - 50, `+${f.powers.regen}`, '#44dd66');
    spawnParticles(f.sprite.x, f.sprite.y, 4, 0x44ff66, 3);
    f.powers.regen--;
    if (f.powers.regen <= 0) delete f.powers.regen;
    updateHPBar(f);
  }
}

function killFrog(f) {
  f.alive = false; f.hp = 0;
  spawnParticles(f.sprite.x, f.sprite.y, 25, 0xff4444, 10);
  gsap.to(f.sprite, { alpha: 0, duration: 0.5 });
  updateHPBar(f);
  // Hide intent
  const ic = intentSprites.get(f);
  if (ic) { uiContainer.removeChild(ic); ic.destroy(); intentSprites.delete(f); }
}

function decayPowers(f) {
  for (const k of ['weak', 'vulnerable']) { if (f.powers[k] > 0) { f.powers[k]--; if (f.powers[k] <= 0) delete f.powers[k]; } }
}

function checkWinLose() {
  if (!aliveEnemyFrogs().length) { setTimeout(() => showEndScreen(true), 600); return true; }
  if (!alivePlayerFrogs().length) { setTimeout(() => showEndScreen(false), 600); return true; }
  return false;
}

function playCard(idx, target) {
  if (gameState !== 'playerTurn') return;
  const card = hand[idx]; if (!card || card.cost > energy) return;
  energy -= card.cost; hand.splice(idx, 1); discardPile.push(card);
  gameState = 'animating';
  const atk = alivePlayerFrogs()[0] || playerTeam[0];

  switch (card.type) {
    case 'attack': {
      const hits = card.multi || 1;
      doAtkSeq(atk, target, card, hits, 0, () => {
        applyCPowers(card, target);
        if (card.drain) { const h = Math.floor(card.baseDmg * 0.5); atk.hp = Math.min(atk.maxHp, atk.hp + h); spawnDmgText(atk.sprite.x, atk.sprite.y - 50, `+${h}`, '#44dd66'); updateHPBar(atk); }
        if (target.hp <= 0) killFrog(target);
        if (!checkWinLose()) { gameState = 'playerTurn'; rebuildHandUI(); buildEnergyUI(); updateHUD(); }
      });
      break;
    }
    case 'skill': {
      if (card.heal) { atk.hp = Math.min(atk.maxHp, atk.hp + card.heal); spawnDmgText(atk.sprite.x, atk.sprite.y - 50, `+${card.heal}`, '#44dd66'); spawnParticles(atk.sprite.x, atk.sprite.y, 10, 0x44ff66, 4); updateHPBar(atk); }
      if (card.block) { atk.block += card.block; spawnDmgText(atk.sprite.x, atk.sprite.y - 50, `+${card.block} BLK`, '#4488ff'); spawnParticles(atk.sprite.x, atk.sprite.y, 8, 0x4488ff, 3); updateHPBar(atk); }
      applyCPowers(card, target);
      setTimeout(() => { gameState = 'playerTurn'; rebuildHandUI(); buildEnergyUI(); updateHUD(); }, 300);
      break;
    }
    case 'power': {
      applyCPowers(card, card.selfPowers ? atk : target);
      setTimeout(() => { gameState = 'playerTurn'; rebuildHandUI(); buildEnergyUI(); updateHUD(); }, 300);
      break;
    }
  }
}

function applyCPowers(card, target) {
  if (!card.powers) return;
  for (const [k, v] of Object.entries(card.powers)) {
    if (v <= 0) continue;
    target.powers[k] = (target.powers[k] || 0) + v;
    const d = POWER_DEFS[k];
    if (d) { spawnDmgText(target.sprite.x, target.sprite.y - 70, `+${v} ${d.name}`, '#' + d.color.toString(16).padStart(6, '0')); spawnParticles(target.sprite.x, target.sprite.y, 5, d.color, 3); }
  }
}

function doAtkSeq(atk, def, card, total, cur, cb) {
  if (cur >= total || !def.alive) { cb(); return; }
  const sx = atk.baseX;
  const tx = def.sprite.x + (atk.isPlayer ? -60 : 60);
  // Anticipation
  gsap.to(atk.sprite, { x: sx + (atk.isPlayer ? -12 : 12), duration: 0.06, ease: 'power2.in', onComplete: () => {
    // Lunge
    gsap.to(atk.sprite, { x: tx, duration: 0.15, ease: 'power2.inOut', onComplete: () => {
      const { dmg, isCrit } = calcDamage(card.baseDmg, atk, def);
      applyDamage(def, dmg, card.color, isCrit);
      spawnParticles(def.sprite.x, def.sprite.y, 10, parseInt(card.color.replace('#', ''), 16), 6);
      // Return
      gsap.to(atk.sprite, { x: sx, duration: 0.2, ease: 'back.out(2)', onComplete: () => {
        setTimeout(() => doAtkSeq(atk, def, card, total, cur + 1, cb), 100);
      }});
    }});
  }});
}

// ============================================================
//  END TURN + ENEMY AI
// ============================================================
function endTurn() {
  if (gameState !== 'playerTurn') return;
  discardPile.push(...hand); hand = [];
  alivePlayerFrogs().forEach(decayPowers);
  rebuildHandUI();
  if (endTurnBtn) { uiContainer.removeChild(endTurnBtn); endTurnBtn.destroy({ children: true }); endTurnBtn = null; }
  gameState = 'enemyTurn';
  setTimeout(enemyTurn, 300);
}

function enemyTurn() {
  enemyTeam.forEach(f => { if (f.alive) { f.block = 0; processTurnStart(f); if (f.hp <= 0) killFrog(f); } });
  if (checkWinLose()) return;
  const alive = aliveEnemyFrogs();
  let idx = 0;
  function next() {
    if (idx >= alive.length) {
      enemyIntents = enemyTeam.map(f => f.alive ? rollIntent(f) : null);
      aliveEnemyFrogs().forEach(decayPowers);
      setTimeout(() => { gameState = 'playerTurn'; startPlayerTurn(); }, 300);
      return;
    }
    const ef = alive[idx]; const ei = enemyTeam.indexOf(ef);
    const intent = enemyIntents[ei]; idx++;
    if (!intent) { next(); return; }
    const tgt = randomAlive(playerTeam); if (!tgt) { checkWinLose(); return; }

    switch (intent.type) {
      case 'attack': {
        const sx = ef.baseX, tx = tgt.sprite.x + (ef.isPlayer ? -60 : 60);
        gsap.to(ef.sprite, { x: sx + 12, duration: 0.06, ease: 'power2.in', onComplete: () => {
          gsap.to(ef.sprite, { x: tx, duration: 0.15, ease: 'power2.inOut', onComplete: () => {
            let dmg = Math.max(1, Math.floor(intent.dmg * (0.85 + Math.random() * 0.15)));
            if (ef.powers.weak > 0) dmg = Math.floor(dmg * 0.75);
            if (tgt.powers.vulnerable > 0) dmg = Math.floor(dmg * 1.5);
            applyDamage(tgt, dmg, intent.color);
            if (intent.vuln) { tgt.powers.vulnerable = (tgt.powers.vulnerable || 0) + intent.vuln; }
            if (tgt.hp <= 0) killFrog(tgt);
            gsap.to(ef.sprite, { x: sx, duration: 0.2, ease: 'back.out(2)', onComplete: () => {
              [...playerTeam, ...enemyTeam].forEach(updateHPBar);
              if (!checkWinLose()) setTimeout(next, 250);
            }});
          }});
        }});
        break;
      }
      case 'poison': {
        const sx = ef.baseX, tx = tgt.sprite.x + 60;
        gsap.to(ef.sprite, { x: tx, duration: 0.2, ease: 'power2.inOut', onComplete: () => {
          let dmg = Math.max(1, Math.floor(intent.dmg * (0.85 + Math.random() * 0.15)));
          applyDamage(tgt, dmg, intent.color);
          tgt.powers.poison = (tgt.powers.poison || 0) + intent.poisonAmt;
          spawnDmgText(tgt.sprite.x, tgt.sprite.y - 70, `+${intent.poisonAmt} PSN`, '#cc66ff');
          if (tgt.hp <= 0) killFrog(tgt);
          gsap.to(ef.sprite, { x: sx, duration: 0.2, ease: 'back.out(2)', onComplete: () => {
            [...playerTeam, ...enemyTeam].forEach(updateHPBar);
            if (!checkWinLose()) setTimeout(next, 250);
          }});
        }});
        break;
      }
      case 'heal': {
        ef.hp = Math.min(ef.maxHp, ef.hp + intent.heal);
        spawnDmgText(ef.sprite.x, ef.sprite.y - 50, `+${intent.heal}`, '#44dd66');
        spawnParticles(ef.sprite.x, ef.sprite.y, 10, 0x44ff66, 4);
        updateHPBar(ef);
        setTimeout(next, 400);
        break;
      }
      case 'block': {
        ef.block += intent.block;
        spawnDmgText(ef.sprite.x, ef.sprite.y - 50, `+${intent.block} BLK`, '#4488ff');
        spawnParticles(ef.sprite.x, ef.sprite.y, 8, 0x4488ff, 3);
        updateHPBar(ef);
        setTimeout(next, 400);
        break;
      }
      case 'debuff': {
        tgt.powers.weak = (tgt.powers.weak || 0) + intent.weak;
        spawnDmgText(tgt.sprite.x, tgt.sprite.y - 50, `+${intent.weak} WEAK`, '#8866aa');
        spawnParticles(tgt.sprite.x, tgt.sprite.y, 6, 0x8866aa, 3);
        setTimeout(next, 400);
        break;
      }
      default: setTimeout(next, 300);
    }
  }
  setTimeout(next, 200);
}

function randomAlive(team) { const a = team.filter(f => f.alive); return a.length ? a[Math.floor(Math.random() * a.length)] : null; }

// ============================================================
//  WIN/LOSE SCREEN
// ============================================================
function showEndScreen(isWin) {
  gameState = isWin ? 'win' : 'lose';
  const overlay = new PIXI.Graphics().rect(0, 0, GW, GH).fill({ color: 0x000000, alpha: 0.7 });
  uiContainer.addChild(overlay);

  const title = new PIXI.Text({
    text: isWin ? 'VICTORY!' : 'DEFEAT',
    style: { fontFamily: 'Segoe UI', fontSize: 56, fontWeight: 'bold', fill: isWin ? '#44dd66' : '#dd4444', stroke: { color: '#000000', width: 5 } }
  });
  title.anchor.set(0.5); title.x = GW / 2; title.y = GH / 2 - 50;
  uiContainer.addChild(title);
  gsap.from(title.scale, { x: 0, y: 0, duration: 0.5, ease: 'back.out(3)' });

  const sub = new PIXI.Text({
    text: isWin ? 'All enemy frogs defeated!' : 'Your team has fallen...',
    style: { fontFamily: 'Segoe UI', fontSize: 18, fill: '#cccccc' }
  });
  sub.anchor.set(0.5); sub.x = GW / 2; sub.y = GH / 2 + 10;
  uiContainer.addChild(sub);

  const turns = new PIXI.Text({
    text: `${turnNumber} turns`,
    style: { fontFamily: 'Segoe UI', fontSize: 14, fill: '#888888' }
  });
  turns.anchor.set(0.5); turns.x = GW / 2; turns.y = GH / 2 + 40;
  uiContainer.addChild(turns);

  // Restart button
  const btn = new PIXI.Container();
  btn.x = GW / 2; btn.y = GH / 2 + 85;
  btn.eventMode = 'static'; btn.cursor = 'pointer';
  const btnBg = new PIXI.Graphics().roundRect(-65, -18, 130, 36, 10).fill(0x2a3366);
  btnBg.roundRect(-65, -18, 130, 36, 10).stroke({ color: 0x5566aa, width: 2 });
  btn.addChild(btnBg);
  const btnTxt = new PIXI.Text({ text: 'PLAY AGAIN', style: { fontFamily: 'Segoe UI', fontSize: 15, fontWeight: 'bold', fill: '#ffffff' } });
  btnTxt.anchor.set(0.5);
  btn.addChild(btnTxt);
  btn.on('pointerover', () => gsap.to(btn.scale, { x: 1.1, y: 1.1, duration: 0.1 }));
  btn.on('pointerout', () => gsap.to(btn.scale, { x: 1, y: 1, duration: 0.1 }));
  btn.on('pointerdown', () => {
    // Full reset
    gameContainer.removeChildren();
    uiContainer.removeChildren();
    particleContainer.removeChildren();
    particles.length = 0; floatingTexts.length = 0;
    hpBars.clear(); intentSprites.clear();
    cardSprites = [];
    buildBackground();
    initGame();
  });
  uiContainer.addChild(btn);
}
