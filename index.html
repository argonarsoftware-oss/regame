<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frog Legends - Turn-Based Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
canvas { display: block; cursor: default; image-rendering: pixelated; }
#gameContainer {
  position: relative;
  border: 3px solid #2a2a4a;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(100, 60, 255, 0.3);
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="960" height="640"></canvas>
</div>

<script>
// ============================================================
//  FROG LEGENDS — Axie-style Turn-Based Battle (v2)
//  Patterns from: Slay the Web, Ancient Beast, Pokemon Showdown,
//  Creature Chess, PixiJS Open Games
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- Sprite sheet frame data (from manifest.json bbox) ----
const FRAME_DATA_6 = [
  { x: 19, y: 30, w: 77, h: 57 },
  { x: 147, y: 29, w: 77, h: 57 },
  { x: 276, y: 29, w: 77, h: 57 },
  { x: 405, y: 30, w: 77, h: 57 },
  { x: 533, y: 31, w: 77, h: 57 },
  { x: 659, y: 31, w: 77, h: 57 },
];

// ---- Asset loading ----
const images = {};
const imageSources = {
  player: 'sprites/ember/ember_sheet_6frame.png',
  enemy:  'sprites/toxic/toxic_sheet_6frame.png',
  frost:  'sprites/frost/frost_sheet_6frame.png',
};
const BG_NAMES = ['Tropical', 'Volcano', 'Frozen', 'Cosmic', 'Inferno', 'Toxic Swamp'];
const bgCanvases = [];
let currentBg = 0;
let loadedCount = 0;
const totalImages = Object.keys(imageSources).length;
for (const [key, src] of Object.entries(imageSources)) {
  const img = new Image();
  img.onload = () => { loadedCount++; if (loadedCount >= totalImages) { generateBackgrounds(); init(); } };
  img.onerror = () => console.error('Failed to load', src);
  img.src = src;
  images[key] = img;
}

// ============================================================
//  PROCEDURAL BACKGROUND GENERATOR (inspired by original art)
// ============================================================
function generateBackgrounds() {
  const bw = 960, bh = 640;
  const configs = [
    { // 0: Tropical — blue sky, green field, palm trees, mountains
      sky: ['#4aa3df', '#87ceeb', '#c8e6c9'],
      ground: ['#5d9e3a', '#7ec850', '#4a8c2a'],
      mountains: ['#3a7a5a', '#2d6b4a'],
      features: 'tropical',
    },
    { // 1: Volcano — red/orange sky, dark cracked ground, lava, erupting volcano
      sky: ['#1a0a00', '#8b1a00', '#ff4400'],
      ground: ['#1a1210', '#2a1a15', '#0d0a08'],
      mountains: ['#2a1a10', '#1a0d08'],
      features: 'volcano',
    },
    { // 2: Frozen — light blue sky, snow mountains, ice crystals
      sky: ['#b8d4e8', '#e8f4f8', '#d0e8f0'],
      ground: ['#c8dce8', '#e0eef5', '#a0c0d8'],
      mountains: ['#e8f0f5', '#c8dce8'],
      features: 'frozen',
    },
    { // 3: Cosmic — purple/magenta sky, floating islands, stars, nebula
      sky: ['#0d0020', '#2a0845', '#4a1060'],
      ground: ['#3a2020', '#4a2830', '#2a1515'],
      mountains: ['#5a3040', '#3a1a25'],
      features: 'cosmic',
    },
    { // 4: Inferno — dark purple, lava rivers, crystal formations
      sky: ['#0a0015', '#1a0530', '#35104a'],
      ground: ['#1a1008', '#0d0804', '#2a1810'],
      mountains: ['#2a1530', '#1a0a20'],
      features: 'inferno',
    },
    { // 5: Toxic Swamp — green glow, dead trees, acid pools
      sky: ['#0a1a08', '#1a3010', '#2a4018'],
      ground: ['#1a2a10', '#2a3a18', '#0d1a08'],
      mountains: ['#3a4a20', '#2a3515'],
      features: 'toxic',
    },
  ];

  for (const cfg of configs) {
    const c = document.createElement('canvas');
    c.width = bw; c.height = bh;
    const g = c.getContext('2d');
    drawArenaBackground(g, bw, bh, cfg);
    bgCanvases.push(c);
  }
}

function drawArenaBackground(g, w, h, cfg) {
  const groundY = h * 0.55;

  // Sky gradient
  const skyGrad = g.createLinearGradient(0, 0, 0, groundY);
  cfg.sky.forEach((c, i) => skyGrad.addColorStop(i / (cfg.sky.length - 1), c));
  g.fillStyle = skyGrad;
  g.fillRect(0, 0, w, groundY + 30);

  // Ground gradient
  const gndGrad = g.createLinearGradient(0, groundY - 20, 0, h);
  cfg.ground.forEach((c, i) => gndGrad.addColorStop(i / (cfg.ground.length - 1), c));
  g.fillStyle = gndGrad;
  g.fillRect(0, groundY - 20, w, h - groundY + 20);

  // Feature-specific details
  switch (cfg.features) {
    case 'tropical': drawTropical(g, w, h, groundY); break;
    case 'volcano':  drawVolcano(g, w, h, groundY); break;
    case 'frozen':   drawFrozen(g, w, h, groundY); break;
    case 'cosmic':   drawCosmic(g, w, h, groundY); break;
    case 'inferno':  drawInferno(g, w, h, groundY); break;
    case 'toxic':    drawToxicSwamp(g, w, h, groundY); break;
  }

  // Ground line (subtle)
  g.strokeStyle = 'rgba(255,255,255,0.08)';
  g.lineWidth = 2;
  g.beginPath();
  g.moveTo(0, groundY);
  for (let x = 0; x <= w; x += 20) {
    g.lineTo(x, groundY + Math.sin(x * 0.02) * 5 + Math.sin(x * 0.05) * 3);
  }
  g.stroke();
}

function drawMountains(g, w, baseY, color1, color2, count, maxH, jagged) {
  for (let i = 0; i < count; i++) {
    const cx = (w / (count - 1)) * i + (Math.random() - 0.5) * 80;
    const mw = 120 + Math.random() * 200;
    const mh = maxH * (0.6 + Math.random() * 0.4);
    const grad = g.createLinearGradient(cx, baseY - mh, cx, baseY);
    grad.addColorStop(0, color1);
    grad.addColorStop(1, color2);
    g.fillStyle = grad;
    g.beginPath();
    g.moveTo(cx - mw / 2, baseY);
    if (jagged) {
      const steps = 6 + Math.floor(Math.random() * 4);
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const x = cx - mw / 2 + mw * t;
        const peakT = 1 - Math.abs(t - 0.5) * 2;
        const y = baseY - mh * peakT + (Math.random() - 0.5) * mh * 0.15;
        g.lineTo(x, y);
      }
    } else {
      g.lineTo(cx - mw * 0.1, baseY - mh);
      g.lineTo(cx + mw * 0.1, baseY - mh * 0.9);
      g.lineTo(cx + mw / 2, baseY);
    }
    g.closePath();
    g.fill();
  }
}

function drawClouds(g, w, baseY, color, count) {
  g.fillStyle = color;
  for (let i = 0; i < count; i++) {
    const cx = Math.random() * w;
    const cy = 30 + Math.random() * baseY * 0.5;
    const cw = 80 + Math.random() * 160;
    const ch = 25 + Math.random() * 30;
    g.globalAlpha = 0.2 + Math.random() * 0.3;
    g.beginPath();
    g.ellipse(cx, cy, cw, ch, 0, 0, Math.PI * 2);
    g.fill();
    g.beginPath();
    g.ellipse(cx - cw * 0.3, cy + 5, cw * 0.6, ch * 0.7, 0, 0, Math.PI * 2);
    g.fill();
    g.beginPath();
    g.ellipse(cx + cw * 0.3, cy + 3, cw * 0.5, ch * 0.8, 0, 0, Math.PI * 2);
    g.fill();
  }
  g.globalAlpha = 1;
}

function drawStars(g, w, h, count, colors) {
  for (let i = 0; i < count; i++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h * 0.5;
    const sr = 0.5 + Math.random() * 2;
    g.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    g.globalAlpha = 0.4 + Math.random() * 0.6;
    g.beginPath();
    g.arc(sx, sy, sr, 0, Math.PI * 2);
    g.fill();
  }
  g.globalAlpha = 1;
}

function drawRocks(g, groundY, w, count, colors) {
  for (let i = 0; i < count; i++) {
    const rx = Math.random() * w;
    const ry = groundY + Math.random() * 80 - 10;
    const rw = 15 + Math.random() * 40;
    const rh = 10 + Math.random() * 25;
    g.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    g.globalAlpha = 0.6 + Math.random() * 0.4;
    g.beginPath();
    g.moveTo(rx - rw / 2, ry);
    g.lineTo(rx - rw * 0.3, ry - rh);
    g.lineTo(rx + rw * 0.2, ry - rh * 0.8);
    g.lineTo(rx + rw / 2, ry);
    g.closePath();
    g.fill();
  }
  g.globalAlpha = 1;
}

// ---------- TROPICAL ----------
function drawTropical(g, w, h, groundY) {
  drawMountains(g, w, groundY + 20, '#3a8a5a', '#2a6a3a', 5, 200, false);
  drawMountains(g, w, groundY + 10, '#4a9a6a', '#3a7a4a', 4, 140, false);
  drawClouds(g, w, groundY, 'rgba(255,255,255,0.9)', 6);

  // Palm trees
  for (const px of [80, 200, 750, 880]) {
    const py = groundY - 5;
    // Trunk
    g.strokeStyle = '#6b4226';
    g.lineWidth = 8;
    g.beginPath();
    g.moveTo(px, py);
    g.quadraticCurveTo(px + 10, py - 80, px + 5, py - 140);
    g.stroke();
    // Fronds
    for (let f = 0; f < 6; f++) {
      const angle = (f / 6) * Math.PI * 2;
      const fx = px + 5 + Math.cos(angle) * 60;
      const fy = py - 140 + Math.sin(angle) * 30 + (Math.sin(angle) > 0 ? 15 : -5);
      g.strokeStyle = '#2d8a2e';
      g.lineWidth = 4;
      g.beginPath();
      g.moveTo(px + 5, py - 140);
      g.quadraticCurveTo(px + 5 + Math.cos(angle) * 30, py - 145 + Math.sin(angle) * 10, fx, fy);
      g.stroke();
    }
  }

  // Grass tufts
  g.strokeStyle = '#4a9a3a';
  g.lineWidth = 2;
  for (let i = 0; i < 40; i++) {
    const gx = Math.random() * w;
    const gy = groundY + Math.random() * 20;
    for (let b = 0; b < 3; b++) {
      g.beginPath();
      g.moveTo(gx + b * 4 - 4, gy);
      g.quadraticCurveTo(gx + b * 4 - 2 + (Math.random() - 0.5) * 10, gy - 12, gx + b * 4 + (Math.random() - 0.5) * 8, gy - 18 - Math.random() * 8);
      g.stroke();
    }
  }

  // Flowers
  for (let i = 0; i < 15; i++) {
    g.fillStyle = ['#ff4466', '#ffaa22', '#ff66aa', '#ffff44'][Math.floor(Math.random() * 4)];
    const fx = Math.random() * w;
    const fy = groundY + 5 + Math.random() * 30;
    g.beginPath();
    g.arc(fx, fy, 3 + Math.random() * 3, 0, Math.PI * 2);
    g.fill();
  }

  drawRocks(g, groundY, w, 8, ['#7a8a6a', '#6a7a5a', '#8a9a7a']);
}

// ---------- VOLCANO ----------
function drawVolcano(g, w, h, groundY) {
  // Volcano mountain (center-back)
  const vcx = w * 0.5, vby = groundY + 20;
  const grad = g.createLinearGradient(vcx, vby - 280, vcx, vby);
  grad.addColorStop(0, '#3a1a08');
  grad.addColorStop(0.7, '#2a1208');
  grad.addColorStop(1, '#1a0d05');
  g.fillStyle = grad;
  g.beginPath();
  g.moveTo(vcx - 250, vby);
  g.lineTo(vcx - 60, vby - 280);
  g.lineTo(vcx - 30, vby - 260);
  g.lineTo(vcx + 30, vby - 265);
  g.lineTo(vcx + 60, vby - 275);
  g.lineTo(vcx + 250, vby);
  g.closePath();
  g.fill();

  // Lava glow at crater
  const lavaGrad = g.createRadialGradient(vcx, vby - 270, 5, vcx, vby - 250, 80);
  lavaGrad.addColorStop(0, 'rgba(255,200,50,0.9)');
  lavaGrad.addColorStop(0.3, 'rgba(255,100,0,0.6)');
  lavaGrad.addColorStop(1, 'rgba(255,50,0,0)');
  g.fillStyle = lavaGrad;
  g.fillRect(vcx - 80, vby - 310, 160, 100);

  // Lava eruption streaks
  g.strokeStyle = '#ff6600';
  g.lineWidth = 3;
  for (let i = 0; i < 8; i++) {
    g.globalAlpha = 0.5 + Math.random() * 0.5;
    const ex = vcx + (Math.random() - 0.5) * 40;
    g.beginPath();
    g.moveTo(ex, vby - 270);
    g.quadraticCurveTo(ex + (Math.random() - 0.5) * 100, vby - 330 - Math.random() * 60, ex + (Math.random() - 0.5) * 60, vby - 350 - Math.random() * 50);
    g.stroke();
  }
  g.globalAlpha = 1;

  // Side mountains
  drawMountains(g, w, groundY + 15, '#2a1510', '#1a0d08', 6, 160, true);

  // Lava cracks on ground
  g.strokeStyle = '#ff4400';
  g.lineWidth = 3;
  g.shadowColor = '#ff6600';
  g.shadowBlur = 10;
  for (let i = 0; i < 12; i++) {
    g.globalAlpha = 0.4 + Math.random() * 0.4;
    const lx = Math.random() * w;
    const ly = groundY + 10 + Math.random() * (h - groundY - 30);
    g.beginPath();
    g.moveTo(lx, ly);
    let cx = lx, cy = ly;
    for (let s = 0; s < 3 + Math.floor(Math.random() * 4); s++) {
      cx += (Math.random() - 0.5) * 60;
      cy += Math.random() * 20;
      g.lineTo(cx, cy);
    }
    g.stroke();
  }
  g.shadowBlur = 0;
  g.globalAlpha = 1;

  // Embers in sky
  for (let i = 0; i < 30; i++) {
    g.fillStyle = Math.random() > 0.5 ? '#ff6600' : '#ffaa00';
    g.globalAlpha = 0.3 + Math.random() * 0.5;
    g.beginPath();
    g.arc(Math.random() * w, Math.random() * groundY, 1 + Math.random() * 2, 0, Math.PI * 2);
    g.fill();
  }
  g.globalAlpha = 1;

  // Smoke clouds
  drawClouds(g, w, groundY * 0.3, 'rgba(60,30,10,0.8)', 4);

  drawRocks(g, groundY, w, 10, ['#2a1a10', '#3a2215', '#1a1008']);
}

// ---------- FROZEN ----------
function drawFrozen(g, w, h, groundY) {
  // Snow mountains
  drawMountains(g, w, groundY + 10, '#e8f0f5', '#c0d4e0', 5, 220, true);
  drawMountains(g, w, groundY + 5, '#d0e4ee', '#b0c8d8', 4, 160, true);

  // Snow caps (white highlights on peaks)
  g.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 20; i++) {
    g.beginPath();
    g.arc(Math.random() * w, groundY - 50 - Math.random() * 150, 15 + Math.random() * 30, 0, Math.PI * 2);
    g.fill();
  }

  drawClouds(g, w, groundY * 0.4, 'rgba(230,240,248,0.8)', 5);

  // Ice crystals
  g.strokeStyle = '#a0d8f0';
  g.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const ix = 50 + Math.random() * (w - 100);
    const iy = groundY - 10 + Math.random() * 30;
    const ih = 20 + Math.random() * 40;
    g.globalAlpha = 0.4 + Math.random() * 0.4;
    // Crystal shape
    g.fillStyle = 'rgba(160,216,240,0.3)';
    g.beginPath();
    g.moveTo(ix, iy);
    g.lineTo(ix - 8, iy - ih * 0.4);
    g.lineTo(ix - 4, iy - ih);
    g.lineTo(ix + 4, iy - ih * 0.9);
    g.lineTo(ix + 8, iy - ih * 0.3);
    g.closePath();
    g.fill();
    g.stroke();
  }
  g.globalAlpha = 1;

  // Snow on ground
  g.fillStyle = 'rgba(230,240,250,0.3)';
  for (let i = 0; i < 30; i++) {
    g.beginPath();
    g.ellipse(Math.random() * w, groundY + Math.random() * 80, 20 + Math.random() * 50, 5 + Math.random() * 8, 0, 0, Math.PI * 2);
    g.fill();
  }

  // Snowflakes
  g.fillStyle = '#fff';
  for (let i = 0; i < 40; i++) {
    g.globalAlpha = 0.3 + Math.random() * 0.5;
    g.beginPath();
    g.arc(Math.random() * w, Math.random() * h * 0.8, 1 + Math.random() * 2, 0, Math.PI * 2);
    g.fill();
  }
  g.globalAlpha = 1;

  drawRocks(g, groundY, w, 6, ['#b0c4d0', '#c0d4e0', '#90a8b8']);
}

// ---------- COSMIC ----------
function drawCosmic(g, w, h, groundY) {
  // Nebula glow
  const nebGrad = g.createRadialGradient(w * 0.3, h * 0.25, 50, w * 0.5, h * 0.3, 300);
  nebGrad.addColorStop(0, 'rgba(120,40,180,0.4)');
  nebGrad.addColorStop(0.5, 'rgba(80,20,140,0.2)');
  nebGrad.addColorStop(1, 'rgba(40,10,80,0)');
  g.fillStyle = nebGrad;
  g.fillRect(0, 0, w, h);

  const neb2 = g.createRadialGradient(w * 0.7, h * 0.15, 30, w * 0.7, h * 0.2, 200);
  neb2.addColorStop(0, 'rgba(200,60,100,0.3)');
  neb2.addColorStop(1, 'rgba(100,20,60,0)');
  g.fillStyle = neb2;
  g.fillRect(0, 0, w, h);

  drawStars(g, w, h, 100, ['#fff', '#aaccff', '#ffaacc', '#ccaaff']);

  // Floating islands
  for (const [fx, fy, fw] of [[150, 180, 100], [700, 140, 80], [450, 100, 60], [850, 200, 70]]) {
    const iGrad = g.createLinearGradient(fx, fy, fx, fy + 40);
    iGrad.addColorStop(0, '#5a3040');
    iGrad.addColorStop(1, '#3a1a25');
    g.fillStyle = iGrad;
    g.beginPath();
    g.ellipse(fx, fy + 10, fw, 15, 0, 0, Math.PI * 2);
    g.fill();
    // Top terrain
    g.fillStyle = '#4a2535';
    g.beginPath();
    g.moveTo(fx - fw, fy + 5);
    for (let t = 0; t <= 1; t += 0.1) {
      g.lineTo(fx - fw + fw * 2 * t, fy - 5 - Math.sin(t * Math.PI) * 15 + (Math.random() - 0.5) * 5);
    }
    g.lineTo(fx + fw, fy + 5);
    g.closePath();
    g.fill();
    // Glow underneath
    g.globalAlpha = 0.3;
    g.fillStyle = '#aa44ff';
    g.beginPath();
    g.ellipse(fx, fy + 20, fw * 0.7, 8, 0, 0, Math.PI * 2);
    g.fill();
    g.globalAlpha = 1;
  }

  // Dark rocky ground
  drawMountains(g, w, groundY + 20, '#4a2535', '#2a1520', 5, 100, true);
  drawRocks(g, groundY, w, 12, ['#5a3040', '#4a2535', '#3a1a25']);

  // Purple lava cracks
  g.strokeStyle = '#aa44ff';
  g.lineWidth = 2;
  g.shadowColor = '#cc66ff';
  g.shadowBlur = 8;
  for (let i = 0; i < 6; i++) {
    g.globalAlpha = 0.4 + Math.random() * 0.3;
    const lx = Math.random() * w;
    const ly = groundY + 20 + Math.random() * 60;
    g.beginPath();
    g.moveTo(lx, ly);
    for (let s = 0; s < 3; s++) g.lineTo(lx + (Math.random() - 0.5) * 80, ly + Math.random() * 30);
    g.stroke();
  }
  g.shadowBlur = 0;
  g.globalAlpha = 1;
}

// ---------- INFERNO ----------
function drawInferno(g, w, h, groundY) {
  // Deep lava glow from below
  const lavaGlow = g.createLinearGradient(0, groundY, 0, h);
  lavaGlow.addColorStop(0, 'rgba(255,80,0,0.1)');
  lavaGlow.addColorStop(1, 'rgba(255,40,0,0.3)');
  g.fillStyle = lavaGlow;
  g.fillRect(0, groundY, w, h - groundY);

  drawMountains(g, w, groundY + 15, '#2a1530', '#1a0a20', 6, 180, true);
  drawStars(g, w, h, 30, ['#ffaa44', '#ff6644', '#ffcc88']);

  // Crystal formations
  for (let i = 0; i < 8; i++) {
    const cx = 40 + Math.random() * (w - 80);
    const cy = groundY - 5;
    const ch = 30 + Math.random() * 60;
    const cw = 6 + Math.random() * 10;
    const grad = g.createLinearGradient(cx, cy, cx, cy - ch);
    grad.addColorStop(0, '#4a2060');
    grad.addColorStop(0.5, '#7a40a0');
    grad.addColorStop(1, '#aa60d0');
    g.fillStyle = grad;
    g.globalAlpha = 0.6 + Math.random() * 0.4;
    g.beginPath();
    g.moveTo(cx - cw, cy);
    g.lineTo(cx - cw * 0.3, cy - ch);
    g.lineTo(cx + cw * 0.3, cy - ch * 0.85);
    g.lineTo(cx + cw, cy);
    g.closePath();
    g.fill();
    // Crystal glow
    g.shadowColor = '#aa66ff';
    g.shadowBlur = 12;
    g.fill();
    g.shadowBlur = 0;
  }
  g.globalAlpha = 1;

  // Lava rivers
  g.strokeStyle = '#ff4400';
  g.lineWidth = 8;
  g.shadowColor = '#ff6600';
  g.shadowBlur = 15;
  for (let i = 0; i < 4; i++) {
    g.globalAlpha = 0.5 + Math.random() * 0.3;
    const lx = Math.random() * w;
    const ly = groundY + 30 + Math.random() * 60;
    g.beginPath();
    g.moveTo(lx, ly);
    g.bezierCurveTo(lx + 80, ly - 10, lx + 160, ly + 20, lx + 200 + Math.random() * 100, ly + Math.random() * 30);
    g.stroke();
    // Inner glow
    g.strokeStyle = '#ffaa00';
    g.lineWidth = 3;
    g.stroke();
    g.strokeStyle = '#ff4400';
    g.lineWidth = 8;
  }
  g.shadowBlur = 0;
  g.globalAlpha = 1;

  // Embers
  for (let i = 0; i < 25; i++) {

  }

}

// ---------- TOXIC SWAMP ----------
function drawToxicSwamp(g, w, h, groundY) {
  // Green atmospheric glow
  const glow = g.createRadialGradient(w * 0.5, groundY, 100, w * 0.5, groundY, 400);
  glow.addColorStop(0, 'rgba(80,200,40,0.15)');
  glow.addColorStop(1, 'rgba(40,100,20,0)');
  g.fillStyle = glow;
  g.fillRect(0, 0, w, h);

  drawMountains(g, w, groundY + 15, '#3a4a20', '#2a3515', 4, 120, true);
  drawClouds(g, w, groundY * 0.4, 'rgba(80,120,40,0.5)', 4);

  // Dead trees
  for (const tx of [100, 300, 650, 860]) {
    const ty = groundY - 5;
    g.strokeStyle = '#3a3020';
    g.lineWidth = 6;
    g.beginPath();
    g.moveTo(tx, ty);
    g.lineTo(tx + 3, ty - 80);
    g.stroke();
    // Branches
    g.lineWidth = 3;
    g.beginPath(); g.moveTo(tx + 3, ty - 60); g.lineTo(tx + 30, ty - 85); g.stroke();
    g.beginPath(); g.moveTo(tx + 2, ty - 50); g.lineTo(tx - 25, ty - 75); g.stroke();
    g.beginPath(); g.moveTo(tx + 3, ty - 35); g.lineTo(tx + 20, ty - 50); g.stroke();
  }

  // Acid pools
  g.shadowColor = '#44ff00';
  g.shadowBlur = 15;
  for (let i = 0; i < 6; i++) {
    const ax = 80 + Math.random() * (w - 160);
    const ay = groundY + 20 + Math.random() * 80;
    const aw = 30 + Math.random() * 70;
    const ah = 8 + Math.random() * 15;
    const poolGrad = g.createRadialGradient(ax, ay, 0, ax, ay, aw);
    poolGrad.addColorStop(0, 'rgba(120,255,40,0.6)');
    poolGrad.addColorStop(0.6, 'rgba(80,200,20,0.4)');
    poolGrad.addColorStop(1, 'rgba(40,120,10,0.1)');
    g.fillStyle = poolGrad;
    g.beginPath();
    g.ellipse(ax, ay, aw, ah, 0, 0, Math.PI * 2);
    g.fill();
  }
  g.shadowBlur = 0;

  // Toxic bubbles
  for (let i = 0; i < 20; i++) {
    g.strokeStyle = 'rgba(120,255,40,0.4)';
    g.lineWidth = 1;
    const bx = Math.random() * w;
    const by = groundY + 10 + Math.random() * 100;
    const br = 2 + Math.random() * 5;
    g.beginPath();
    g.arc(bx, by, br, 0, Math.PI * 2);
    g.stroke();
  }

  // Mushrooms
  for (let i = 0; i < 10; i++) {
    const mx = Math.random() * w;
    const my = groundY + Math.random() * 40;
    const ms = 5 + Math.random() * 10;
    g.fillStyle = ['#aa44ff', '#44dd66', '#ff44aa'][Math.floor(Math.random() * 3)];
    g.globalAlpha = 0.5 + Math.random() * 0.3;
    // Cap
    g.beginPath();
    g.ellipse(mx, my - ms, ms, ms * 0.6, 0, 0, Math.PI * 2);
    g.fill();
    // Stem
    g.fillStyle = '#8a8a6a';
    g.fillRect(mx - 2, my - ms * 0.3, 4, ms * 0.8);
  }
  g.globalAlpha = 1;

  // Fog at bottom
  g.fillStyle = 'rgba(60,100,30,0.15)';
  for (let i = 0; i < 8; i++) {
    g.beginPath();
    g.ellipse(Math.random() * w, h - 20 - Math.random() * 60, 100 + Math.random() * 150, 20 + Math.random() * 20, 0, 0, Math.PI * 2);
    g.fill();
  }

  drawRocks(g, groundY, w, 8, ['#3a4a20', '#4a5a28', '#2a3515']);
}

// ============================================================
//  TWEEN ENGINE (from PixiJS Open Games patterns)
// ============================================================
function easeOutQuad(t) { return t * (2 - t); }
function easeOutBack(t) { const s = 1.70158; return 1 + (--t) * t * ((s + 1) * t + s); }
function easeOutElastic(t) {
  return t === 0 || t === 1 ? t : Math.pow(2, -10 * t) * Math.sin((t - 0.1) * 5 * Math.PI) + 1;
}
function easeInQuad(t) { return t * t; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

const tweens = [];
function tweenTo(target, props, duration, ease = easeOutQuad, onComplete) {
  const tw = { target, props: {}, duration, elapsed: 0, ease, onComplete, done: false };
  for (const [k, v] of Object.entries(props)) {
    tw.props[k] = { from: target[k], to: v };
  }
  tweens.push(tw);
  return tw;
}
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i];
    tw.elapsed = Math.min(tw.elapsed + dt, tw.duration);
    const t = tw.ease(tw.elapsed / tw.duration);
    for (const [k, { from, to }] of Object.entries(tw.props)) {
      tw.target[k] = from + (to - from) * t;
    }
    if (tw.elapsed >= tw.duration) {
      tw.done = true;
      tweens.splice(i, 1);
      tw.onComplete?.();
    }
  }
}
function killTweensOf(target) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    if (tweens[i].target === target) tweens.splice(i, 1);
  }
}

// ============================================================
//  SCREEN SHAKE (from PixiJS Games earthquake pattern)
// ============================================================
const camera = { offsetX: 0, offsetY: 0, shakePower: 0, shakeDuration: 0, shakeElapsed: 0 };
function screenShake(power = 8, duration = 400) {
  camera.shakePower = power;
  camera.shakeDuration = duration;
  camera.shakeElapsed = 0;
}
function updateShake(dt) {
  if (camera.shakeElapsed < camera.shakeDuration) {
    camera.shakeElapsed += dt;
    const t = camera.shakeElapsed / camera.shakeDuration;
    const p = camera.shakePower * (1 - t);
    camera.offsetX = (Math.random() * 2 - 1) * p;
    camera.offsetY = (Math.random() * 2 - 1) * p;
  } else {
    camera.offsetX = 0;
    camera.offsetY = 0;
  }
}

// ============================================================
//  PARTICLE SYSTEM with Object Pooling (from PixiJS patterns)
// ============================================================
const particlePool = [];
const activeParticles = [];

function getParticle() {
  return particlePool.pop() || { x: 0, y: 0, vx: 0, vy: 0, color: '#fff', life: 0, maxLife: 0, size: 0, type: 'circle', alpha: 1, rotation: 0 };
}
function releaseParticle(p) { particlePool.push(p); }

function spawnParticles(x, y, count, color, type = 'circle', spread = 5) {
  for (let i = 0; i < count; i++) {
    const p = getParticle();
    p.x = x + (Math.random() - 0.5) * 30;
    p.y = y + (Math.random() - 0.5) * 30;
    p.vx = (Math.random() - 0.5) * spread;
    p.vy = (Math.random() - 1) * spread;
    p.color = color;
    p.life = 500 + Math.random() * 500;
    p.maxLife = p.life;
    p.size = 3 + Math.random() * 5;
    p.type = type;
    p.alpha = 1;
    p.rotation = Math.random() * Math.PI * 2;
    activeParticles.push(p);
  }
}

function updateParticles(dt) {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.x += p.vx * dt / 16;
    p.y += p.vy * dt / 16;
    p.vy += 0.1 * dt / 16;
    p.life -= dt;
    p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) {
      activeParticles.splice(i, 1);
      releaseParticle(p);
    }
  }
}

function drawParticles() {
  for (const p of activeParticles) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'circle') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'star') {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation + p.life * 0.01);
      drawStar(0, 0, p.size * p.alpha, p.size * 0.4 * p.alpha, 5);
      ctx.fill();
    } else if (p.type === 'spark') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawStar(cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI) / points - Math.PI / 2;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    else ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
}

// ============================================================
//  FLOATING TEXT SYSTEM with pooling (from PixiJS PointToaster)
// ============================================================
const floatingTexts = [];

function spawnDamageText(x, y, text, color, scale = 1.5) {
  floatingTexts.push({
    x: x + (Math.random() - 0.5) * 40, y, text, color,
    vy: -2.5, life: 1200, maxLife: 1200, scale,
    phase: 'rise', elapsed: 0
  });
}

function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy * dt / 16;
    ft.vy *= 0.98;
    ft.life -= dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const alpha = Math.max(0, ft.life / ft.maxLife);
    const popScale = ft.scale * (0.8 + 0.2 * Math.min(1, (ft.maxLife - ft.life) / 200));
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.round(18 * popScale)}px "Segoe UI", Arial`;
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

// ============================================================
//  DAMAGE PIPELINE (from Slay the Web + Pokemon Showdown)
//  base → strength → weak → crit → type effectiveness → vulnerable → block → HP
// ============================================================
const TYPE_CHART = {
  fire:   { fire: 0.5, water: 0.5, grass: 2.0, neutral: 1.0 },
  water:  { fire: 2.0, water: 0.5, grass: 0.5, neutral: 1.0 },
  grass:  { fire: 0.5, water: 2.0, grass: 0.5, neutral: 1.0 },
  neutral:{ fire: 1.0, water: 1.0, grass: 1.0, neutral: 1.0 },
};

function calcDamage(baseDmg, attacker, defender, cardElement = 'neutral') {
  let dmg = baseDmg;

  // Strength buff: +N flat damage (from Slay the Web)
  dmg += (attacker.powers.strength || 0);

  // Weak debuff on attacker: deal 75% (from Slay the Web)
  if (attacker.powers.weak > 0) dmg = Math.floor(dmg * 0.75);

  // Burn debuff on attacker: deal 75% (from Pokemon Showdown)
  if (attacker.powers.burn > 0) dmg = Math.floor(dmg * 0.75);

  // Critical hit (from Pokemon Showdown tier system)
  let isCrit = false;
  const critRoll = Math.random();
  if (critRoll < 0.04) { // ~4% base crit chance
    isCrit = true;
    dmg = Math.floor(dmg * 1.5);
  }

  // Type effectiveness (from Pokemon Showdown)
  const atkType = cardElement;
  const defType = defender.element || 'neutral';
  const effectiveness = (TYPE_CHART[atkType] && TYPE_CHART[atkType][defType]) || 1.0;
  dmg = Math.floor(dmg * effectiveness);

  // Random roll 85-100% (from Pokemon Showdown)
  const roll = 0.85 + Math.random() * 0.15;
  dmg = Math.floor(dmg * roll);

  // Vulnerable on defender: take 150% (from Slay the Web)
  if (defender.powers.vulnerable > 0) dmg = Math.floor(dmg * 1.5);

  // Minimum 1 damage (from Ancient Beast)
  dmg = Math.max(1, dmg);

  return { dmg, isCrit, effectiveness };
}

function applyDamage(target, rawDmg, color = '#ff4444', isCrit = false, effectiveness = 1.0) {
  let dmg = rawDmg;

  // Block absorb (from Slay the Web)
  if (target.block > 0) {
    const blocked = Math.min(target.block, dmg);
    target.block -= blocked;
    dmg -= blocked;
    if (blocked > 0) {
      spawnDamageText(target.x, target.y - 100, `${blocked} BLOCKED`, '#4488ff');
      spawnParticles(target.x, target.y, 6, '#4488ff', 'star');
    }
  }

  // Thorns reflect (from Slay the Web)
  // (handled externally after attack resolves)

  if (dmg > 0) {
    target.hp = Math.max(0, target.hp - dmg);
    target.flash = 250;
    target.flashColor = color;

    // Squash/stretch on hit (from PixiJS patterns)
    killTweensOf(target);
    target.scaleX = 1.3;
    target.scaleY = 0.7;
    tweenTo(target, { scaleX: 1, scaleY: 1 }, 600, easeOutElastic);

    // Screen shake proportional to damage (from PixiJS patterns)
    screenShake(Math.min(3 + dmg * 0.3, 15), 300);
  }

  // Effect text
  let label = `-${rawDmg}`;
  if (isCrit) label = `CRIT! -${rawDmg}`;
  if (effectiveness > 1) label += ' (SE!)';
  else if (effectiveness < 1) label += ' (NVE)';

  const textColor = isCrit ? '#ffff00' : effectiveness > 1 ? '#ff4444' : effectiveness < 1 ? '#8888aa' : color;
  spawnDamageText(target.x, target.y - 70, label, textColor, isCrit ? 2.0 : 1.5);

  if (isCrit) {
    spawnParticles(target.x, target.y, 25, '#ffff00', 'star', 10);
    screenShake(15, 400);
  }

  return dmg;
}

// ============================================================
//  DECK SYSTEM (from Slay the Web 5-pile system)
// ============================================================
let drawPile = [], hand = [], discardPile = [], exhaustPile = [];

function buildDeck() {
  const deck = [];
  // Build deck: 2 copies of each card
  for (const def of CARD_DEFS) {
    for (let i = 0; i < 2; i++) {
      deck.push({ ...def, id: Math.random().toString(36).substr(2, 9) });
    }
  }
  shuffleArray(deck);
  drawPile = deck;
  hand = [];
  discardPile = [];
  exhaustPile = [];
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function drawCards(count) {
  for (let i = 0; i < count; i++) {
    if (drawPile.length === 0) {
      drawPile = [...discardPile];
      discardPile = [];
      shuffleArray(drawPile);
    }
    if (drawPile.length > 0 && hand.length < 10) {
      hand.push(drawPile.pop());
    }
  }
}

function rollIntent() {
  const hpPct = enemy.hp / enemy.maxHp;
  let weights;
  if (hpPct < 0.3) {
    weights = [1, 1, 4, 2, 0, 1, 2]; // favor healing
  } else if (hpPct < 0.6) {
    weights = [2, 2, 1, 2, 2, 1, 1]; // balanced
  } else {
    weights = [3, 2, 0, 1, 2, 2, 1]; // aggressive
  }
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) return { ...ENEMY_INTENTS[i] };
  }
  return { ...ENEMY_INTENTS[0] };
}

  turnNumber = 0;
  currentBg = Math.floor(Math.random() * 6);
  floatingTexts.length = 0;
  activeParticles.length = 0;
  tweens.length = 0;
  actionQueue = [];
  buildDeck();
  nextIntent = rollIntent();
  startPlayerTurn();
  gameState = 'playerTurn';
  lastTime = 0;
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  TURN LIFECYCLE (from Slay the Web + Pokemon Showdown)
// ============================================================
function startPlayerTurn() {
  turnNumber++;
  energy = ENERGY_MAX;
  player.block = 0; // block resets each turn (from Slay the Web)
  drawCards(5);

  // Process player start-of-turn effects
  processStartOfTurn(player);
}

function processStartOfTurn(fighter) {
  // Poison: flat DoT, decreases by 1 each turn (from Slay the Web)
  if (fighter.powers.poison > 0) {
    const poisonDmg = fighter.powers.poison;
    fighter.hp = Math.max(0, fighter.hp - poisonDmg);
    fighter.flash = 200; fighter.flashColor = '#aa44ff';
    spawnDamageText(fighter.x, fighter.y - 70, `${poisonDmg} POISON`, '#cc66ff');
    spawnParticles(fighter.x, fighter.y, 10, '#aa44ff', 'circle');
    fighter.powers.poison--;
    if (fighter.powers.poison <= 0) delete fighter.powers.poison;
    screenShake(4, 200);
  }

  // Toxic: escalating DoT (from Pokemon Showdown)
  if (fighter.powers.toxic > 0) {
    fighter.toxicStage = Math.min(15, (fighter.toxicStage || 0) + 1);
    const toxDmg = Math.max(1, Math.floor(fighter.maxHp / 16) * fighter.toxicStage);
    fighter.hp = Math.max(0, fighter.hp - toxDmg);
    fighter.flash = 200; fighter.flashColor = '#66ff44';
    spawnDamageText(fighter.x, fighter.y - 70, `${toxDmg} TOXIC`, '#66ff44');
    spawnParticles(fighter.x, fighter.y, 12, '#66ff44', 'circle');
    screenShake(5, 200);
  }

  // Burn: DoT + already handled in damage calc (from Pokemon Showdown)
  if (fighter.powers.burn > 0) {
    const burnDmg = Math.max(1, Math.floor(fighter.maxHp / 16));
    fighter.hp = Math.max(0, fighter.hp - burnDmg);
    fighter.flash = 200; fighter.flashColor = '#ff8822';
    spawnDamageText(fighter.x, fighter.y - 90, `${burnDmg} BURN`, '#ff8822');
    spawnParticles(fighter.x, fighter.y, 8, '#ff8822', 'circle');
    fighter.powers.burn--;
    if (fighter.powers.burn <= 0) delete fighter.powers.burn;
  }

  // Regen: heal per turn (from Slay the Web)
  if (fighter.powers.regen > 0) {
    const healAmt = fighter.powers.regen;
    fighter.hp = Math.min(fighter.maxHp, fighter.hp + healAmt);
    spawnDamageText(fighter.x, fighter.y - 70, `+${healAmt} REGEN`, '#44dd66');
    spawnParticles(fighter.x, fighter.y, 6, '#44ff66', 'circle', 3);
    fighter.powers.regen--;
    if (fighter.powers.regen <= 0) delete fighter.powers.regen;
  }

  // Check death
  if (fighter.hp <= 0) {
    setTimeout(() => { gameState = fighter.isPlayer ? 'lose' : 'win'; }, 600);
  }
}

function decayPowers(fighter) {
  // Decay non-persistent powers by 1 each turn (from Slay the Web)
  for (const key of ['weak', 'vulnerable']) {
    if (fighter.powers[key] > 0) {
      fighter.powers[key]--;
      if (fighter.powers[key] <= 0) delete fighter.powers[key];
    }
  }
}

// ============================================================
//  CARD CONDITIONS (from Slay the Web)
// ============================================================
function canPlayCard(card) {
  if (card.cost > energy) return false;
  if (card.conditions) {
    for (const cond of card.conditions) {
      if (cond === 'targetBelow50' && enemy.hp > enemy.maxHp * 0.5) return false;
    }
  }
  return true;
}

// ============================================================
//  PLAY CARD (from Slay the Web pipeline)
// ============================================================
function playCard(cardIndex) {
  if (gameState !== 'playerTurn') return;
  const card = hand[cardIndex];
  if (!card || !canPlayCard(card)) return;

  energy -= card.cost;
  hand.splice(cardIndex, 1);
  selectedCard = -1;

  // Discard or exhaust (from Slay the Web)
  if (card.exhaust) {
    exhaustPile.push(card);
    spawnDamageText(player.x, player.y - 40, 'EXHAUST', '#888');
  } else {
    discardPile.push(card);
  }

  gameState = 'animating';

  // Process card actions
  if (card.actions) {
    for (const action of card.actions) {
      if (action === 'draw1') drawCards(1);
      if (action === 'draw2') drawCards(2);
      if (action === 'energy1') energy = Math.min(energy + 1, ENERGY_MAX + 2);
    }
  }

  switch (card.type) {
    case 'attack': {
      const hits = card.multi || 1;
      doAttackSequence(player, enemy, card, hits, 0, () => {
        // Thorns reflect (from Slay the Web)
        if (enemy.powers.thorns > 0) {
          const thornsDmg = enemy.powers.thorns;
          player.hp = Math.max(0, player.hp - thornsDmg);
          spawnDamageText(player.x, player.y - 70, `${thornsDmg} THORNS`, '#886644');
          spawnParticles(player.x, player.y, 6, '#886644', 'circle');
        }
        // Apply powers to enemy
        applyCardPowers(card, enemy);
        // Drain heal action
        if (card.actions && card.actions.includes('drainHeal')) {
          const healAmt = Math.floor(card.baseDmg * 0.5);
          player.hp = Math.min(player.maxHp, player.hp + healAmt);
          spawnDamageText(player.x, player.y - 70, `+${healAmt}`, '#44dd66');
          spawnParticles(player.x, player.y, 8, '#44ff66', 'circle', 3);
        }
        checkWinLose('playerTurn');
      });
      break;
    }
    case 'skill': {
      if (card.heal) {
        player.hp = Math.min(player.maxHp, player.hp + card.heal);
        spawnDamageText(player.x, player.y - 70, `+${card.heal}`, '#44dd66');
        spawnParticles(player.x, player.y, 15, '#44ff66', 'circle', 4);
        spawnParticles(player.x, player.y, 8, '#88ffaa', 'star', 3);
      }
      if (card.block) {
        player.block += card.block;
        spawnDamageText(player.x, player.y - 70, `+${card.block} BLOCK`, '#4488ff');
        spawnParticles(player.x, player.y, 12, '#4488ff', 'star', 3);
      }
      // Apply powers to enemy (e.g. Toxic Spit)
      if (card.target === 'enemy') {
        applyCardPowers(card, enemy);
      } else {
        applyCardPowers(card, player);
      }
      setTimeout(() => { if (gameState === 'animating') gameState = 'playerTurn'; }, 400);
      break;
    }
    case 'power': {
      // Self buffs (from Slay the Web power cards)
      if (card.selfPowers) {
        applyCardPowers(card, player);
      } else {
        applyCardPowers(card, enemy);
      }
      setTimeout(() => { if (gameState === 'animating') gameState = 'playerTurn'; }, 400);
      break;
    }
  }
}

function applyCardPowers(card, target) {
  if (!card.powers) return;
  for (const [key, val] of Object.entries(card.powers)) {
    if (val <= 0) continue;
    target.powers[key] = (target.powers[key] || 0) + val;
    const def = POWER_DEFS[key];
    if (def) {
      spawnDamageText(target.x, target.y - 90, `+${val} ${def.name}`, def.color);
      spawnParticles(target.x, target.y, 8, def.color, 'circle', 3);
    }
  }
}

function doAttackSequence(attacker, target, card, totalHits, currentHit, onComplete) {
  if (currentHit >= totalHits) {
    onComplete();
    return;
  }
  doLungeAttack(attacker, target, () => {
    const { dmg, isCrit, effectiveness } = calcDamage(card.baseDmg, attacker, target, card.element);
    applyDamage(target, dmg, card.color, isCrit, effectiveness);
    spawnParticles(target.x, target.y, 12, card.color, 'spark', 8);
    if (isCrit) spawnParticles(target.x, target.y, 8, '#ffff00', 'star', 6);
  }, () => {
    setTimeout(() => doAttackSequence(attacker, target, card, totalHits, currentHit + 1, onComplete), 150);
  });
}

function doLungeAttack(attacker, target, onHit, onReturn) {
  const startX = attacker.baseX;
  const targetX = target.x + (attacker.isPlayer ? -80 : 80);

  // Anticipation: pull back slightly (from PixiJS squash/stretch)
  tweenTo(attacker, { x: startX + (attacker.isPlayer ? -15 : 15) }, 80, easeInQuad, () => {
    // Lunge forward
    tweenTo(attacker, { x: targetX }, 200, easeInOutQuad, () => {
      onHit();
      // Return with bounce
      tweenTo(attacker, { x: startX }, 250, easeOutBack, () => {
        onReturn();
      });
    });
  });
}

function checkWinLose(returnState = 'playerTurn') {
  if (enemy.hp <= 0) {
    spawnParticles(enemy.x, enemy.y, 40, '#ff4444', 'star', 12);
    spawnParticles(enemy.x, enemy.y, 30, '#ffaa00', 'spark', 10);
    screenShake(20, 600);
    setTimeout(() => { gameState = 'win'; }, 1000);
  } else if (player.hp <= 0) {
    spawnParticles(player.x, player.y, 40, '#ff4444', 'star', 12);
    screenShake(20, 600);
    setTimeout(() => { gameState = 'lose'; }, 1000);
  } else {
    setTimeout(() => { if (gameState === 'animating') gameState = returnState; }, 100);
  }
}

// ============================================================
//  END TURN + ENEMY TURN (from Slay the Web)
// ============================================================
function endTurn() {
  if (gameState !== 'playerTurn') return;
  discardPile.push(...hand);
  hand = [];
  selectedCard = -1;
  decayPowers(player);
  gameState = 'enemyTurn';
  setTimeout(enemyTurn, 500);
}

function enemyTurn() {
  enemy.block = 0; // reset enemy block
  processStartOfTurn(enemy);
  if (enemy.hp <= 0) return;
  decayPowers(enemy);

  // Execute current intent
  currentIntent = nextIntent;
  const intent = currentIntent;
  gameState = 'animating';

  switch (intent.type) {
    case 'attack': {
      doLungeAttack(enemy, player, () => {
        // Random 85-100% roll on intent damage
        const roll = 0.85 + Math.random() * 0.15;
        let dmg = Math.floor(intent.dmg * roll);
        if (enemy.powers.weak > 0) dmg = Math.floor(dmg * 0.75);
        if (player.powers.vulnerable > 0) dmg = Math.floor(dmg * 1.5);
        dmg = Math.max(1, dmg);
        applyDamage(player, dmg, intent.color);
        spawnParticles(player.x, player.y, 15, intent.color, 'spark', 8);
        if (intent.vuln) {
          player.powers.vulnerable = (player.powers.vulnerable || 0) + intent.vuln;
          spawnDamageText(player.x, player.y - 100, `+${intent.vuln} VULN`, '#ff4488');
        }
      }, () => {
        finishEnemyTurn();
      });
      break;
    }
    case 'poison': {
      doLungeAttack(enemy, player, () => {
        const roll = 0.85 + Math.random() * 0.15;
        let dmg = Math.max(1, Math.floor(intent.dmg * roll));
        applyDamage(player, dmg, intent.color);
        player.powers.poison = (player.powers.poison || 0) + intent.poisonAmt;
        spawnDamageText(player.x, player.y - 100, `+${intent.poisonAmt} PSN`, '#cc66ff');
        spawnParticles(player.x, player.y, 15, '#aa44ff', 'circle', 6);
      }, () => {
        finishEnemyTurn();
      });
      break;
    }
    case 'heal': {
      enemy.hp = Math.min(enemy.maxHp, enemy.hp + intent.heal);
      spawnDamageText(enemy.x, enemy.y - 70, `+${intent.heal}`, '#44dd66');
      spawnParticles(enemy.x, enemy.y, 15, '#44ff66', 'circle', 4);
      setTimeout(finishEnemyTurn, 600);
      break;
    }
    case 'block': {
      enemy.block += intent.block;
      spawnDamageText(enemy.x, enemy.y - 70, `+${intent.block} BLOCK`, '#4488ff');
      spawnParticles(enemy.x, enemy.y, 12, '#4488ff', 'star', 3);
      setTimeout(finishEnemyTurn, 600);
      break;
    }
    case 'debuff': {
      if (intent.weak) {
        player.powers.weak = (player.powers.weak || 0) + intent.weak;
        spawnDamageText(player.x, player.y - 70, `+${intent.weak} WEAK`, '#8866aa');
        spawnParticles(player.x, player.y, 10, '#8866aa', 'circle', 4);
      }
      setTimeout(finishEnemyTurn, 600);
      break;
    }
    case 'drain': {
      doLungeAttack(enemy, player, () => {
        const roll = 0.85 + Math.random() * 0.15;
        let dmg = Math.max(1, Math.floor(intent.dmg * roll));
        applyDamage(player, dmg, intent.color);
        enemy.hp = Math.min(enemy.maxHp, enemy.hp + intent.healAmt);
        spawnDamageText(enemy.x, enemy.y - 70, `+${intent.healAmt}`, '#44dd66');
      }, () => {
        finishEnemyTurn();
      });
      break;
    }
    default:
      setTimeout(finishEnemyTurn, 600);
  }
}

function finishEnemyTurn() {
  if (player.hp <= 0) {
    checkWinLose();
    return;
  }
  nextIntent = rollIntent();
  setTimeout(() => {
    if (gameState === 'animating' || gameState === 'enemyTurn') {
      gameState = 'playerTurn';
      startPlayerTurn();
    }
  }, 400);
}

// ============================================================
//  DRAWING
// ============================================================
function drawBackground() {
  const bgCanvas = bgCanvases[currentBg];
  if (bgCanvas) {
    ctx.drawImage(bgCanvas, 0, 0, W, H);
    const vig = ctx.createRadialGradient(480, 320, 200, 480, 320, 520);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a1a3e');
    grad.addColorStop(1, '#0d2137');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.save();
  ctx.font = '11px "Segoe UI", Arial';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText(BG_NAMES[currentBg] || '', W - 12, H - 6);
  ctx.restore();
}

function drawSprite(fighter) {
  const img = images[fighter.imgKey];
  if (!img) return;
  const fd = FRAME_DATA_6[fighter.frame];
  ctx.save();
  const dx = fighter.x;
  const dy = fighter.y;

  // Shadow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(dx, dy + fd.h * fighter.scale / 2 + 10, 45 * fighter.scaleX, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.translate(dx, dy);

  // Mirror enemy
  const flipX = fighter.isPlayer ? 1 : -1;
  ctx.scale(flipX * fighter.scaleX, fighter.scaleY);

  // Hit flash
  if (fighter.flash > 0) {
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(fighter.flash * 0.06);
  }

  // Idle bounce (sine wave from PixiJS patterns)
  const bounce = Math.sin(performance.now() * 0.003 + (fighter.isPlayer ? 0 : Math.PI)) * 4;

  ctx.drawImage(img,
    fd.x, fd.y, fd.w, fd.h,
    -fd.w * fighter.scale / 2, -fd.h * fighter.scale / 2 + bounce,
    fd.w * fighter.scale, fd.h * fighter.scale
  );

  // Flash overlay
  if (fighter.flash > 0) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = fighter.flashColor;
    ctx.globalAlpha = fighter.flash / 500;
    ctx.fillRect(-fd.w * fighter.scale / 2, -fd.h * fighter.scale / 2 + bounce,
      fd.w * fighter.scale, fd.h * fighter.scale);
  }
  ctx.restore();

  // Block aura
  if (fighter.block > 0) {
    ctx.save();
    ctx.globalAlpha = 0.2 + 0.1 * Math.sin(performance.now() * 0.005);
    ctx.strokeStyle = '#44aaff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(dx, dy, 65, 55, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#44aaff';
    ctx.fill();
    ctx.restore();
  }

  // Status effect indicators under sprite
  drawStatusIcons(fighter, dx, dy + 65);
}

function drawStatusIcons(fighter, x, y) {
  const keys = Object.keys(fighter.powers);
  if (keys.length === 0) return;
  const startX = x - (keys.length * 18) / 2;
  ctx.save();
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  for (let i = 0; i < keys.length; i++) {
    const key = keys[i];
    const def = POWER_DEFS[key];
    if (!def) continue;
    const px = startX + i * 20;
    const bobble = Math.sin(performance.now() * 0.004 + i) * 2;
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(px, y + bobble, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px "Segoe UI"';
    ctx.fillText(fighter.powers[key], px, y + bobble + 3);
  }
  ctx.restore();
}

function drawHPBar(fighter, x, y, width) {
  const barH = 24;
  const hpPct = Math.max(0, fighter.hp / fighter.maxHp);
  const hpColor = hpPct > 0.5 ? '#44dd66' : hpPct > 0.25 ? '#ddaa44' : '#dd4444';

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.strokeStyle = '#444466';
  ctx.lineWidth = 2;
  roundRect(x, y, width, barH, 6, true, true);

  // HP fill
  if (hpPct > 0) {
    const grad = ctx.createLinearGradient(x, y, x, y + barH);
    grad.addColorStop(0, hpColor);
    grad.addColorStop(1, shadeColor(hpColor, -30));
    ctx.fillStyle = grad;
    roundRect(x + 2, y + 2, (width - 4) * hpPct, barH - 4, 4, true, false);
  }

  // Block overlay
  if (fighter.block > 0) {
    ctx.fillStyle = 'rgba(68, 136, 255, 0.35)';
    const blockPct = Math.min(1, fighter.block / 30);
    roundRect(x + 2, y + 2, (width - 4) * blockPct, barH - 4, 4, true, false);
  }

  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px "Segoe UI", Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.max(0, fighter.hp)} / ${fighter.maxHp}`, x + width / 2, y + barH - 7);

  // Name + element above
  ctx.font = 'bold 14px "Segoe UI", Arial';
  ctx.fillStyle = '#ddd';
  const elemIcon = fighter.element === 'fire' ? '🔥' : fighter.element === 'water' ? '💧' : fighter.element === 'grass' ? '🌿' : '';
  ctx.fillText(`${elemIcon} ${fighter.name}`, x + width / 2, y - 8);

  // Block / status to the right
  let sx = x + width + 8;
  ctx.textAlign = 'left';
  ctx.font = '13px Arial';
  if (fighter.block > 0) {
    ctx.fillStyle = '#4488ff';
    ctx.fillText(`🛡️${fighter.block}`, sx, y + 16);
    sx += 45;
  }
}

function drawIntent() {
  if (!nextIntent || gameState === 'win' || gameState === 'lose') return;
  const ix = enemy.x;
  const iy = 60;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.85;

  // Intent box
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ix - 50, iy - 8, 100, 34, 6, true, false);
  ctx.strokeStyle = nextIntent.color + '88';
  ctx.lineWidth = 1;
  roundRect(ix - 50, iy - 8, 100, 34, 6, false, true);

  ctx.font = '16px Arial';
  ctx.fillText(nextIntent.icon, ix - 30, iy + 16);
  ctx.font = 'bold 12px "Segoe UI"';
  ctx.fillStyle = nextIntent.color;
  ctx.fillText(nextIntent.name, ix + 10, iy + 8);

  // Show damage/effect value
  ctx.font = '11px "Segoe UI"';
  ctx.fillStyle = '#ccc';
  if (nextIntent.dmg) ctx.fillText(`${nextIntent.dmg} dmg`, ix + 10, iy + 22);
  else if (nextIntent.heal) ctx.fillText(`+${nextIntent.heal} HP`, ix + 10, iy + 22);
  else if (nextIntent.block) ctx.fillText(`+${nextIntent.block} blk`, ix + 10, iy + 22);
  else if (nextIntent.weak) ctx.fillText(`${nextIntent.weak} weak`, ix + 10, iy + 22);

  ctx.restore();
}

function drawCards() {
  if (gameState !== 'playerTurn') return;
  const cardW = 90, cardH = 130, gap = 6;
  const totalW = hand.length * (cardW + gap) - gap;
  const startX = Math.max(10, (W - totalW) / 2);
  const baseY = H - cardH - 18;

  for (let i = 0; i < hand.length; i++) {
    const card = hand[i];
    const x = startX + i * (cardW + gap);
    const isHovered = i === hoveredCard;
    const canAfford = canPlayCard(card);
    const y = isHovered ? baseY - 25 : baseY;

    ctx.save();

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    roundRect(x + 3, y + 3, cardW, cardH, 8, true, false);

    // Card background
    const grad = ctx.createLinearGradient(x, y, x, y + cardH);
    grad.addColorStop(0, canAfford ? '#2a2a4a' : '#1e1e2a');
    grad.addColorStop(1, canAfford ? '#1a1a3a' : '#141420');
    ctx.fillStyle = grad;
    ctx.strokeStyle = isHovered && canAfford ? '#aaaaff' : canAfford ? card.color + '66' : '#2a2a2a';
    ctx.lineWidth = isHovered ? 2.5 : 1.5;
    roundRect(x, y, cardW, cardH, 8, true, true);

    // Color accent bar
    ctx.fillStyle = canAfford ? card.color : '#333';
    roundRect(x + 4, y + 4, cardW - 8, 3, 2, true, false);

    // Exhaust indicator
    if (card.exhaust) {
      ctx.fillStyle = '#ffcc0033';
      roundRect(x + 2, y + 2, cardW - 4, cardH - 4, 6, true, false);
    }

    ctx.globalAlpha = canAfford ? 1 : 0.35;

    // Icon
    ctx.font = '24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(card.icon, x + cardW / 2, y + 40);

    // Name
    ctx.font = 'bold 11px "Segoe UI"';
    ctx.fillStyle = '#fff';
    ctx.fillText(card.name, x + cardW / 2, y + 60);

    // Description
    ctx.font = '9px "Segoe UI"';
    ctx.fillStyle = '#aaa';
    // Word wrap desc
    const words = card.desc.split(' ');
    let line = '', ly = y + 75;
    for (const word of words) {
      const test = line + word + ' ';
      if (ctx.measureText(test).width > cardW - 12 && line) {
        ctx.fillText(line.trim(), x + cardW / 2, ly);
        line = word + ' ';
        ly += 11;
      } else {
        line = test;
      }
    }
    ctx.fillText(line.trim(), x + cardW / 2, ly);

    // Element badge
    if (card.element && card.element !== 'neutral') {
      ctx.font = '10px Arial';
      const elemIcon = card.element === 'fire' ? '🔥' : card.element === 'water' ? '💧' : '🌿';
      ctx.fillText(elemIcon, x + 12, y + 18);
    }

    // Exhaust label
    if (card.exhaust) {
      ctx.font = 'bold 8px "Segoe UI"';
      ctx.fillStyle = '#ffcc00';
      ctx.fillText('EXHAUST', x + cardW / 2, y + cardH - 8);
    }

    // Energy cost (top-right)
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(x + cardW - 13, y + 13, 12, 0, Math.PI * 2);
    ctx.fillStyle = canAfford ? '#3355aa' : '#221133';
    ctx.fill();
    ctx.strokeStyle = canAfford ? '#5577cc' : '#332244';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = 'bold 13px "Segoe UI"';
    ctx.fillStyle = canAfford ? '#aaddff' : '#443355';
    ctx.fillText(card.cost, x + cardW - 13, y + 18);

    ctx.restore();
  }
}

function drawEnergyBar() {
  const x = 20, y = H - 50;
  ctx.font = 'bold 13px "Segoe UI"';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aaddff';
  ctx.fillText('ENERGY', x, y - 6);

  for (let i = 0; i < ENERGY_MAX; i++) {
    ctx.beginPath();
    ctx.arc(x + 14 + i * 28, y + 10, 11, 0, Math.PI * 2);
    ctx.fillStyle = i < energy ? '#4488ff' : '#181830';
    ctx.fill();
    ctx.strokeStyle = i < energy ? '#6699ff' : '#2a2a44';
    ctx.lineWidth = 2;
    ctx.stroke();
    if (i < energy) {
      ctx.beginPath();
      ctx.arc(x + 14 + i * 28, y + 8, 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();
    }
  }

  // Deck / discard counts
  ctx.font = '11px "Segoe UI"';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'left';
  ctx.fillText(`Draw: ${drawPile.length}  Disc: ${discardPile.length}  Exh: ${exhaustPile.length}`, x + 100, y + 14);
}

function drawEndTurnButton() {
  if (gameState !== 'playerTurn') return;
  const bx = W - 130, by = H - 58, bw = 105, bh = 38;
  ctx.fillStyle = endTurnHovered ? '#4455aa' : '#2a3366';
  ctx.strokeStyle = endTurnHovered ? '#7799ff' : '#445588';
  ctx.lineWidth = 2;
  roundRect(bx, by, bw, bh, 8, true, true);
  ctx.font = 'bold 14px "Segoe UI"';
  ctx.textAlign = 'center';
  ctx.fillStyle = endTurnHovered ? '#fff' : '#99aacc';
  ctx.fillText('END TURN', bx + bw / 2, by + bh / 2 + 5);
}

function drawTurnIndicator() {
  ctx.font = 'bold 14px "Segoe UI"';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#777';
  ctx.fillText(`Turn ${turnNumber}`, W / 2, 22);
  if (gameState === 'playerTurn') {
    ctx.fillStyle = '#44dd66';
    ctx.font = 'bold 15px "Segoe UI"';
    ctx.fillText('YOUR TURN', W / 2, 42);
  } else if (gameState === 'enemyTurn' || gameState === 'animating') {
    ctx.fillStyle = '#ff6644';
    ctx.font = 'bold 15px "Segoe UI"';
    ctx.fillText('ENEMY TURN', W / 2, 42);
  }
}

function drawWinLoseScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  const isWin = gameState === 'win';
  ctx.textAlign = 'center';

  ctx.font = 'bold 60px "Segoe UI"';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
  ctx.strokeText(isWin ? 'VICTORY!' : 'DEFEAT', W / 2, H / 2 - 40);
  ctx.fillStyle = isWin ? '#44dd66' : '#dd4444';
  ctx.fillText(isWin ? 'VICTORY!' : 'DEFEAT', W / 2, H / 2 - 40);

  ctx.font = '22px "Segoe UI"';
  ctx.fillStyle = '#aaa';
  ctx.fillText(isWin ? 'The enemy frog has been vanquished!' : 'Your frog has fallen...', W / 2, H / 2 + 10);

  ctx.font = '15px "Segoe UI"';
  ctx.fillStyle = '#777';
  ctx.fillText(`Completed in ${turnNumber} turns`, W / 2, H / 2 + 45);

  // Restart button
  const bx = W / 2 - 75, by = H / 2 + 70;
  ctx.fillStyle = restartHovered ? '#4455aa' : '#2a3366';
  ctx.strokeStyle = '#556699'; ctx.lineWidth = 2;
  roundRect(bx, by, 150, 42, 10, true, true);
  ctx.font = 'bold 17px "Segoe UI"';
  ctx.fillStyle = '#fff';
  ctx.fillText('PLAY AGAIN', W / 2, by + 28);

  if (Math.random() > 0.7) {
    spawnParticles(Math.random() * W, Math.random() * H / 2, 1, isWin ? '#44dd66' : '#dd4444', 'star', 2);
  }
  ctx.restore();
}

// ============================================================
//  UTILITY
// ============================================================
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + percent));
  const b = Math.min(255, Math.max(0, (num & 0xff) + percent));
  return `rgb(${r},${g},${b})`;
}

// ============================================================
//  INPUT
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  hoveredCard = -1;
  endTurnHovered = false;
  restartHovered = false;
  canvas.style.cursor = 'default';

  if (gameState === 'playerTurn') {
    const cardW = 90, cardH = 130, gap = 6;
    const totalW = hand.length * (cardW + gap) - gap;
    const startX = Math.max(10, (W - totalW) / 2);
    const baseY = H - cardH - 18;

    for (let i = 0; i < hand.length; i++) {
      const x = startX + i * (cardW + gap);
      if (mx >= x && mx <= x + cardW && my >= baseY - 25 && my <= baseY + cardH) {
        hoveredCard = i;
        if (canPlayCard(hand[i])) canvas.style.cursor = 'pointer';
        break;
      }
    }
    const bx = W - 130, by = H - 58;
    if (mx >= bx && mx <= bx + 105 && my >= by && my <= by + 38) {
      endTurnHovered = true;
      canvas.style.cursor = 'pointer';
    }
  }

  if (gameState === 'win' || gameState === 'lose') {
    const bx = W / 2 - 75, by = H / 2 + 70;
    if (mx >= bx && mx <= bx + 150 && my >= by && my <= by + 42) {
      restartHovered = true;
      canvas.style.cursor = 'pointer';
    }
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  if (gameState === 'playerTurn') {
    if (hoveredCard >= 0 && hand[hoveredCard] && canPlayCard(hand[hoveredCard])) {
      playCard(hoveredCard);
      return;
    }
    if (endTurnHovered) { endTurn(); return; }
  }
  if ((gameState === 'win' || gameState === 'lose') && restartHovered) {
    init();
  }
});

// ============================================================
//  GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min(50, timestamp - (lastTime || timestamp));
  lastTime = timestamp;

  // Update sprites
  for (const f of [player, enemy]) {
    if (!f) continue;
    f.frameTimer += dt;
    if (f.frameTimer >= f.animSpeed) {
      f.frameTimer = 0;
      f.frame = (f.frame + 1) % 6;
    }
    if (f.flash > 0) f.flash = Math.max(0, f.flash - dt);
  }

  updateTweens(dt);
  updateShake(dt);
  updateParticles(dt);
  updateFloatingTexts(dt);

  // Draw with camera shake
  ctx.save();
  ctx.translate(camera.offsetX, camera.offsetY);
  ctx.clearRect(-10, -10, W + 20, H + 20);
  drawBackground();

  if (player && enemy) {
    drawSprite(player);
    drawSprite(enemy);
    drawHPBar(player, 30, 85, 200);
    drawHPBar(enemy, W - 230, 85, 200);
    drawIntent();
    drawTurnIndicator();
  }
  drawParticles();
  drawFloatingTexts();
  ctx.restore();

  // UI outside camera shake
  if (player && enemy) {
    drawCards();
    drawEnergyBar();
    drawEndTurnButton();
  }

  if (gameState === 'win' || gameState === 'lose') {
    drawWinLoseScreen();
  }

  requestAnimationFrame(gameLoop);
}
</script>
